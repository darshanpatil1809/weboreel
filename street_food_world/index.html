<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>street_food_world</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat&family=Cormorant+Garamond:ital@1&family=DM+Sans&family=Playfair+Display:ital@1&family=Special+Elite&display=swap');

  body, html {
    margin: 0; padding: 0; height: 100vh; overflow: hidden;
    font-family: 'DM Sans', sans-serif; background: #000; color: #fff;
  }

  #mute-btn {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(0,0,0,0.5); border: 1px solid #fff; color: white;
    font-size: 20px; cursor: pointer; padding: 10px; border-radius: 50%;
  }

  #scroll-container {
    width: 100vw; height: 100vh; position: relative;
  }

  .city-section {
    position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.8s ease; z-index: 1; pointer-events: none;
    overflow: hidden;
  }
  .city-section.active { opacity: 1; z-index: 5; pointer-events: auto; }

  /* Map Transition */
  #map-overlay {
    position: fixed; top:0; left:0; width: 100%; height: 100%; background: #111;
    z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    display: flex; justify-content: center; align-items: center;
  }
  .world-map { width: 80vw; height: 40vh; border: 1px dashed #444; position: relative; }
  .flight-path { position: absolute; height: 2px; background: #fff; transform-origin: left center; transition: width 0.5s linear; }
  
  /* Text overlays */
  .city-name { font-family: 'Bebas Neue', sans-serif; font-size: 6rem; position: absolute; top: 5vh; left: 5vw; letter-spacing: 5px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); z-index: 10;}
  .food-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 3rem; color: #f5d0a9; margin-bottom: 1rem; }
  .story-card {
    position: absolute; bottom: 5vh; right: 5vw; max-width: 400px;
    background: rgba(0,0,0,0.7); padding: 2rem; border-left: 3px solid #d4a843;
    backdrop-filter: blur(5px);
  }
  .story-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.3rem; line-height: 1.5; margin-bottom: 1rem; }
  .price { font-family: 'Special Elite', monospace; font-size: 1.5rem; color: #ffcc00; }
  
  .scene-container { position: relative; width: 100%; height: 100%; display:flex; align-items:flex-end; justify-content:center; padding-bottom: 15vh;}
  
  /* City 1: Mumbai */
  #mumbai { background: #1a0d00; }
  .mumbai-cart { width: 300px; height: 200px; background: #5c3a21; position: relative; border-radius: 10px 10px 0 0; border: 2px solid #333;}
  .mumbai-cart::before { content:'वड़ा पाव'; font-family: 'Devanagari', sans-serif; position:absolute; top:-40px; left:50%; transform:translateX(-50%); font-size: 2rem; color: #ff3300; text-shadow: 0 0 10px #ff3300; animation: flicker 2s infinite; width: 100%; text-align: center;}
  .mumbai-cart::after { content:''; position:absolute; bottom:-20px; left:20px; width:40px; height:40px; border-radius:50%; background:#222; box-shadow: 200px 0 0 #222;}
  .vada-pav { width: 80px; height: 60px; background: #d4a843; border-radius: 40px; position:absolute; top:-30px; left: 110px; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3);}
  .vada { width: 60px; height: 30px; background: #8b5e1a; border-radius: 30px; position:absolute; top: 15px; left: 10px; }
  
  /* City 2: Bangkok */
  #bangkok { background: #0a0508; }
  .lantern { width: 40px; height: 60px; background: #ff3300; border-radius: 20px; position:absolute; box-shadow: 0 0 20px rgba(255,100,50,0.6); animation: float 4s ease-in-out infinite alternate;}
  .wok { width: 150px; height: 50px; background: #222; border-radius: 0 0 75px 75px; position:relative; border-top: 5px solid #444;}
  .flame { position:absolute; bottom: -30px; left: 40px; width: 70px; height: 40px; background: #ff6600; filter: blur(5px); clip-path: polygon(20% 100%, 50% 0%, 80% 100%); animation: flicker 0.1s infinite;}
  .pad-thai { position:absolute; top: -10px; left: 20px; width: 110px; height: 20px; background: #e6b800; border-radius: 50%; }
  
  /* City 3: Mexico */
  #mexico { background: #1a0a00; }
  .trompo { width: 80px; height: 120px; background: linear-gradient(to right, #cc3300, #ff6600, #cc3300); clip-path: polygon(20% 0, 80% 0, 100% 50%, 80% 100%, 20% 100%, 0% 50%); position:relative; }
  .taco { width: 80px; height: 40px; background: #f5d0a9; border-radius: 0 0 40px 40px; position:absolute; left: 120px; bottom: 0;}
  .taco::before { content:''; position:absolute; top:0; left:10px; width:60px; height:10px; background:#cc3300; border-radius: 10px; }
  
  /* City 4: Istanbul */
  #istanbul { background: #0a0d1a; }
  .simit-stack { width: 100px; height: 150px; position: relative; }
  .simit { width: 80px; height: 30px; border: 15px solid #8b5e1a; border-radius: 50%; position:absolute; box-sizing:border-box; box-shadow: inset 0 0 5px #000, 0 5px 5px rgba(0,0,0,0.5);}
  .tea-glass { width: 40px; height: 60px; border-radius: 0 0 20px 20px; background: rgba(255,255,255,0.2); position:absolute; left: 120px; bottom: 0; border: 2px solid rgba(255,255,255,0.5); border-top: 2px solid gold;}
  .tea { width: 100%; height: 70%; background: #8b0000; position:absolute; bottom:0; border-radius: 0 0 18px 18px; }
  
  /* City 5: Hanoi */
  #hanoi { background: #0a1008; }
  .stool { width: 60px; height: 40px; background: #0066cc; position:absolute; bottom: 0; left:-100px; border-radius: 5px; }
  .pho-bowl { width: 140px; height: 70px; background: #eee; border-radius: 0 0 70px 70px; position:relative; border-top: 5px solid #ccc; box-shadow: 0 10px 20px rgba(0,0,0,0.5);}
  .broth { width: 130px; height: 15px; background: #3d1a00; border-radius: 50%; position:absolute; top: -5px; left: 5px; }
  .herb { width: 20px; height: 10px; background: #228b22; border-radius: 50%; position:absolute; top: 0; left: 40px; transform: rotate(30deg); }
  
  /* City 6: Naples */
  #naples { background: #1a1000; }
  .pizza-oven { width: 200px; height: 150px; background: #555; border-radius: 100px 100px 0 0; position:relative; display:flex; justify-content:center; align-items:flex-end;}
  .oven-mouth { width: 120px; height: 80px; background: #111; border-radius: 60px 60px 0 0; position:relative; display:flex; justify-content:center; align-items:flex-end; overflow:hidden;}
  .pizza { width: 80px; height: 40px; background: #c8860a; border-radius: 50%; position:absolute; bottom: -10px; transform: perspective(100px) rotateX(60deg); border: 5px solid #a05a00;}
  .pizza::after { content:''; position:absolute; top:10%; left:10%; width:80%; height:80%; background:#cc2222; border-radius:50%; }
  
  /* City 7: Marrakech */
  #marrakech { background: #0a0800; }
  .msemen { width: 120px; height: 120px; background: #e6b800; transform: perspective(300px) rotateX(60deg) rotateZ(45deg); position:relative; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);}
  .msemen::after { content:''; position:absolute; top:10px; left:10px; width:100px; height:100px; border: 2px solid #b38600; }
  .honey { position:absolute; width:40px; height:40px; background: rgba(255,165,0,0.8); border-radius:50%; top:40px; left:40px; filter:blur(2px);}
  
  /* Steam system */
  .steam-particle {
    position: absolute; width: 20px; height: 20px; background: rgba(255,255,255,0.4);
    border-radius: 50%; filter: blur(8px); pointer-events: none; z-index: 10;
  }

  /* Nav dots */
  #nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display:flex; gap: 10px; z-index: 100;}
  .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
  .dot.active { background: #fff; transform: scale(1.5); }

  @keyframes flicker { 0% {opacity:1;} 50% {opacity:0.8;} 100% {opacity:1;} }
  @keyframes float { 0% {transform:translateY(0);} 100% {transform:translateY(-20px);} }

</style>
</head>
<body>

<button id="mute-btn">🍜</button>

<div id="map-overlay">
  <div class="world-map">
    <div class="flight-path" id="flight-path"></div>
  </div>
</div>

<div id="nav"></div>

<div id="scroll-container">
  <!-- Dynamic insertion of cities -->
</div>

<script>
  const cities = [
    { id: 'mumbai', name: 'MUMBAI 🇮🇳', food: 'Vada Pav', price: '₹15', story: "Raju has sold vada pav at this spot since 1989. He knows 2,000 customers by face. His cart hasn't moved once. No restaurant has ever replicated the exact taste of a ₹15 vada pav. The secret ingredient is the chaos around it.", html: '<div class="mumbai-cart"><div class="vada-pav" id="food-0"><div class="vada"></div></div></div>' },
    { id: 'bangkok', name: 'BANGKOK 🇹🇭', food: 'Pad Thai', price: '40 THB', story: "Malee has cooked at this spot for 30 years. She refuses to write a recipe because 'the wok remembers even when I forget.'", html: '<div class="lantern" style="top:20%;left:20%"></div><div class="lantern" style="top:30%;right:30%"></div><div class="wok" id="food-1"><div class="flame"></div><div class="pad-thai"></div></div>' },
    { id: 'mexico', name: 'MEXICO CITY 🇲🇽', food: 'Al Pastor Taco', price: '25 MXN', story: "The trompo at this corner has been spinning since 6am every day for 22 years. The line forms before sunrise. It sells out before noon.", html: '<div class="trompo" id="food-2"></div><div class="taco"></div>' },
    { id: 'istanbul', name: 'ISTANBUL 🇹🇷', food: 'Simit', price: '5 TRY', story: "The word 'simit' appears in Ottoman records from 1525. The recipe has not changed. The vendor changes. The simit remains.", html: '<div class="simit-stack" id="food-3"><div class="simit" style="bottom:0"></div><div class="simit" style="bottom:10px"></div><div class="simit" style="bottom:20px"></div><div class="simit" style="bottom:30px"></div></div><div class="tea-glass"><div class="tea"></div></div>' },
    { id: 'hanoi', name: 'HANOI 🇻🇳', food: 'Pho Bo', price: '40,000 VND', story: "This woman has been serving pho from 5am to 10am every morning for 40 years. After 10am she goes home. She needs nothing else.", html: '<div class="stool"></div><div class="pho-bowl" id="food-4"><div class="broth"></div><div class="herb"></div></div>' },
    { id: 'naples', name: 'NAPLES 🇮🇹', food: 'Pizza Margherita', price: '€1.20', story: "In Naples, if the pizza costs more than €2, go somewhere else. The best pizza in the world costs €1.20. This is not a coincidence.", html: '<div class="pizza-oven"><div class="oven-mouth"><div class="flame"></div><div class="pizza" id="food-5"></div></div></div>' },
    { id: 'marrakech', name: 'MARRAKECH 🇲🇦', food: 'Msemen', price: '5 MAD', story: "The square has been a gathering point for 900 years. The food carts are new — only since the 1400s. 'New' is relative in Marrakech.", html: '<div class="msemen" id="food-6"><div class="honey"></div></div>' }
  ];

  const container = document.getElementById('scroll-container');
  const nav = document.getElementById('nav');

  cities.forEach((city, index) => {
    const section = document.createElement('div');
    section.className = `city-section ${index===0?'active':''}`;
    section.id = city.id;
    section.innerHTML = `
      <div class="city-name">${city.name}</div>
      <div class="scene-container">${city.html}</div>
      <div class="story-card">
        <div class="food-name">${city.food}</div>
        <div class="story-text">${city.story}</div>
        <div class="price">${city.price}</div>
      </div>
    `;
    container.appendChild(section);

    const dot = document.createElement('div');
    dot.className = `dot ${index===0?'active':''}`;
    nav.appendChild(dot);
  });

  // Scroll engine
  let currentIndex = 0;
  let targetIndex = 0;
  let isTransitioning = false;
  const sections = document.querySelectorAll('.city-section');
  const dots = document.querySelectorAll('.dot');
  const mapOverlay = document.getElementById('map-overlay');
  const flightPath = document.getElementById('flight-path');

  function changeCity(newIndex) {
    if(isTransitioning || newIndex < 0 || newIndex >= cities.length || newIndex === currentIndex) return;
    isTransitioning = true;
    targetIndex = newIndex;

    // Transition effect
    mapOverlay.style.opacity = 1;
    flightPath.style.width = '0%';
    setTimeout(()=> flightPath.style.width = '100%', 50);
    playSound('plane');

    setTimeout(() => {
      sections[currentIndex].classList.remove('active');
      dots[currentIndex].classList.remove('active');
      
      currentIndex = targetIndex;
      
      sections[currentIndex].classList.add('active');
      dots[currentIndex].classList.add('active');
      
      updateAudio(currentIndex);
      
      setTimeout(() => {
        mapOverlay.style.opacity = 0;
        isTransitioning = false;
      }, 500);
    }, 500);
  }

  window.addEventListener('wheel', e => {
    if(e.deltaY > 50) changeCity(currentIndex + 1);
    else if(e.deltaY < -50) changeCity(currentIndex - 1);
  }, {passive: true});

  let touchStartY = 0;
  window.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
  window.addEventListener('touchend', e => {
    const deltaY = touchStartY - e.changedTouches[0].clientY;
    if(deltaY > 50) changeCity(currentIndex + 1);
    else if(deltaY < -50) changeCity(currentIndex - 1);
  });

  // Steam particle system
  function createSteam() {
    if(isTransitioning) return;
    const foodEl = document.getElementById(`food-${currentIndex}`);
    if(!foodEl) return;
    
    const rect = foodEl.getBoundingClientRect();
    const x = rect.left + rect.width/2 + (Math.random() * 40 - 20);
    const y = rect.top + 20;

    const steam = document.createElement('div');
    steam.className = 'steam-particle';
    steam.style.cssText = `left:${x}px; top:${y}px;`;
    document.body.appendChild(steam);

    steam.animate([
      {transform: 'translateY(0) scale(1)', opacity: 0.6},
      {transform: `translateY(-${30+Math.random()*50}px) scale(${1.5+Math.random()})`, opacity: 0}
    ], { duration: 1500 + Math.random()*1000, easing: 'ease-out' });
    
    setTimeout(() => steam.remove(), 2500);
  }
  setInterval(createSteam, 400);

  // Audio system
  let audioCtx, masterGain, crowdSource;
  let isMuted = true;
  let activeOscillators = [];

  document.getElementById('mute-btn').addEventListener('click', () => {
    isMuted = !isMuted;
    document.getElementById('mute-btn').innerText = isMuted ? '🍜' : '🔊';
    if(!audioCtx && !isMuted) initAudio();
    if(masterGain) masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.4, audioCtx.currentTime, 0.1);
    if(!isMuted && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  });

  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    masterGain.gain.value = 0.4;

    // Crowd ambient
    const bufferSize = audioCtx.sampleRate * 2;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
    
    crowdSource = audioCtx.createBufferSource();
    crowdSource.buffer = noiseBuffer;
    crowdSource.loop = true;
    
    const lowpass = audioCtx.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 400;
    
    crowdSource.connect(lowpass);
    lowpass.connect(masterGain);
    crowdSource.start();

    updateAudio(currentIndex);
  }

  const cityAudio = [
    {type: 'square', freqs: [220], pulse: true}, // Mumbai
    {type: 'sine', freqs: [294,330,392,440]}, // Bangkok
    {type: 'triangle', freqs: [392,494,523], fast: true}, // Mexico
    {type: 'sine', freqs: [220,247,294,330]}, // Istanbul
    {type: 'sine', freqs: [220,261,294,330,370]}, // Hanoi
    {type: 'square', freqs: [261,329,392,523]}, // Naples
    {type: 'triangle', freqs: [220,246,293,329]} // Marrakech
  ];

  function updateAudio(index) {
    if(!audioCtx || isMuted) return;
    
    activeOscillators.forEach(o => {
      o.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
      setTimeout(()=>o.osc.stop(), 500);
    });
    activeOscillators = [];

    const setup = cityAudio[index];
    setup.freqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = setup.type;
      osc.frequency.value = f;
      gain.gain.value = 0;
      
      osc.connect(gain); gain.connect(masterGain);
      osc.start();
      
      if(setup.pulse) {
        setInterval(() => {
          if(!isMuted && activeOscillators.find(o => o.osc === osc)) {
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
          }
        }, 500);
      } else if (setup.fast) {
        setInterval(() => {
          if(!isMuted && activeOscillators.find(o => o.osc === osc)) {
            osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(f+50, audioCtx.currentTime+0.2);
          }
        }, 600 + i*100);
        gain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.5);
      } else {
        gain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.5);
      }
      activeOscillators.push({osc, gain});
    });
  }

  function playSound(type) {
    if(!audioCtx || isMuted) return;
    if(type === 'plane') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800;
      
      osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
      
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.6);
      
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.3);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
      
      osc.start(); osc.stop(audioCtx.currentTime + 0.6);
    }
  }

</script>
</body>
</html>
