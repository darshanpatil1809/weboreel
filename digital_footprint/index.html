<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>digital_footprint</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
body, html { margin: 0; padding: 0; background: #001100; color: #00ff00; font-family: 'Share Tech Mono', monospace; overflow-x: hidden; height: 500vh; }
.footprint { position: absolute; font-size: 12px; pointer-events: none; white-space: nowrap; opacity: 1; transition: opacity 2s; text-shadow: 0 0 5px #00ff00; }
.scanner { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,255,0,0.5); box-shadow: 0 0 20px #00ff00; z-index: 10; pointer-events: none; }
#mute-btn { position: fixed; top: 20px; right: 20px; border: 1px solid #00ff00; background: transparent; color: #00ff00; padding: 10px; cursor: pointer; z-index: 20; }
.overlay-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; opacity: 0; transition: opacity 0.5s; text-align: center; z-index: 5; pointer-events: none; }
</style>
</head>
<body>
<button id="mute-btn">AUDIO: OFF</button>
<div class="scanner" id="scan"></div>
<div class="overlay-text" id="msg">THEY ARE WATCHING</div>
<script>
const dataPoints = ["IP: 192.168.1.X", "Loc: 34.05,-118.24", "Browser: Chrome", "OS: Windows", "Click_X: ", "Scroll_Y: ", "Device: Mobile", "Time_spent: "];
let actx, master;
let isMuted = true;

document.getElementById('mute-btn').onclick = function() {
  if(!actx) { actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.1; master.connect(actx.destination); }
  isMuted = !isMuted;
  this.innerText = isMuted ? "AUDIO: OFF" : "AUDIO: ON";
};

function playBlip() {
  if(!actx || isMuted) return;
  let o = actx.createOscillator(); let g = actx.createGain();
  o.type = 'square'; o.frequency.value = 1500 + Math.random()*500;
  o.connect(g).connect(master);
  g.gain.setValueAtTime(0.05, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.05);
  o.start(); o.stop(actx.currentTime + 0.05);
}

let lastScroll = 0;
window.addEventListener('scroll', () => {
  let y = window.scrollY;
  document.getElementById('scan').style.top = (y % window.innerHeight) + 'px';
  
  if(Math.abs(y - lastScroll) > 50) {
    let fp = document.createElement('div');
    fp.className = 'footprint';
    fp.style.left = Math.random() * window.innerWidth + 'px';
    fp.style.top = (y + Math.random() * window.innerHeight) + 'px';
    let dp = dataPoints[Math.floor(Math.random()*dataPoints.length)];
    fp.innerText = dp + (Math.random()*1000).toFixed(0);
    document.body.appendChild(fp);
    playBlip();
    lastScroll = y;
    
    // Fade out over time
    setTimeout(() => { fp.style.opacity = 0; setTimeout(()=>fp.remove(), 2000); }, 3000);
  }
  
  if(y > window.innerHeight * 3) document.getElementById('msg').style.opacity = 1;
  else document.getElementById('msg').style.opacity = 0;
});

window.addEventListener('mousemove', e => {
  if(Math.random() < 0.05) {
    let fp = document.createElement('div');
    fp.className = 'footprint';
    fp.style.left = e.pageX + 'px';
    fp.style.top = e.pageY + 'px';
    fp.innerText = `[${e.pageX}, ${e.pageY}]`;
    document.body.appendChild(fp);
    setTimeout(() => { fp.style.opacity = 0; setTimeout(()=>fp.remove(), 2000); }, 1000);
  }
});
</script>
</body>
</html>
