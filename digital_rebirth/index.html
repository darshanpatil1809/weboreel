<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>digital_rebirth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
body, html { margin: 0; padding: 0; background: #050505; color: #00ffcc; overflow: hidden; font-family: 'Space Mono', monospace; }
#scroll-container { position: absolute; top: 0; left: 0; width: 100%; height: 500vh; will-change: transform; z-index: 10; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
.section { position: relative; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; }
.text-fragment { position: absolute; font-size: 2rem; opacity: 0; transition: opacity 0.5s; text-align: center; }
#mute-btn { position: fixed; top: 2rem; right: 2rem; z-index: 20; background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; border-radius: 50%; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.glitch { animation: glitch 0.2s linear infinite; }
@keyframes glitch { 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } }
</style>
</head>
<body>
<div id="mute-btn">🔊</div>
<canvas id="canvas"></canvas>
<div id="scroll-container">
  <div class="section"><div class="text-fragment glitch" id="t1" style="opacity:1;">E R R O R _ 404: I D E N T I T Y _ L O S T</div></div>
  <div class="section"><div class="text-fragment" id="t2">Recompiling fragmented memory sectors...</div></div>
  <div class="section"><div class="text-fragment" id="t3">Checksum valid. Restoring sequence.</div></div>
  <div class="section"><div class="text-fragment" id="t4">Noise reducing. Signal acquired.</div></div>
  <div class="section"><div class="text-fragment" id="t5" style="color: #fff; font-size: 3rem; text-shadow: 0 0 20px #fff;">I AM HERE</div></div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

let current = 0, target = 0, velocity = 0;
const ease = 0.08;
const container = document.getElementById('scroll-container');
window.addEventListener('wheel', e => { e.preventDefault(); target += e.deltaY * 0.85; target = Math.max(0, Math.min(target, 400 * window.innerHeight / 100)); }, { passive: false });

let touchStart = 0;
window.addEventListener('touchstart', e => touchStart = e.touches[0].clientY);
window.addEventListener('touchmove', e => { e.preventDefault(); target += (touchStart - e.touches[0].clientY) * 1.5; touchStart = e.touches[0].clientY; target = Math.max(0, Math.min(target, 400 * window.innerHeight / 100)); }, { passive: false });

class Particle {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.tx = w/2 + (Math.random()-0.5)*300;
    this.ty = h/2 + (Math.random()-0.5)*300;
    this.vx = (Math.random()-0.5)*10;
    this.vy = (Math.random()-0.5)*10;
    this.size = Math.random()*3+1;
  }
  update(progress) {
    if(progress < 0.5) {
      // Glitch chaos
      this.x += (Math.random()-0.5)*20;
      this.y += (Math.random()-0.5)*20;
      if(this.x<0) this.x=w; if(this.x>w) this.x=0;
      if(this.y<0) this.y=h; if(this.y>h) this.y=0;
    } else {
      // Rebuild
      let easeProgress = (progress - 0.5) * 2;
      this.x += (this.tx - this.x) * 0.05 * easeProgress;
      this.y += (this.ty - this.y) * 0.05 * easeProgress;
    }
  }
  draw(ctx, progress) {
    ctx.fillStyle = progress < 0.8 ? '#00ffcc' : '#ffffff';
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}
let particles = Array(400).fill().map(()=>new Particle());

function tick() {
  velocity = (target - current) * ease;
  current += velocity;
  container.style.transform = `translateY(-${current}px)`;
  
  let progress = current / (4 * window.innerHeight);
  
  // UI logic
  document.body.style.background = `rgb(${progress*10}, ${progress*15}, ${progress*20})`;
  document.getElementById('t1').style.opacity = progress < 0.2 ? 1 : 0;
  document.getElementById('t2').style.opacity = progress >= 0.2 && progress < 0.4 ? 1 : 0;
  document.getElementById('t3').style.opacity = progress >= 0.4 && progress < 0.6 ? 1 : 0;
  document.getElementById('t4').style.opacity = progress >= 0.6 && progress < 0.8 ? 1 : 0;
  document.getElementById('t5').style.opacity = progress >= 0.8 ? 1 : 0;

  ctx.fillStyle = `rgba(0,0,0,${0.1 + progress*0.2})`;
  ctx.fillRect(0,0,w,h);
  
  particles.forEach(p => { p.update(progress); p.draw(ctx, progress); });
  
  requestAnimationFrame(tick);
}

// Audio
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx, master, osc;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) {
    actx = new AudioContext();
    master = actx.createGain(); master.gain.value = 0.2; master.connect(actx.destination);
    osc = actx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 50; osc.connect(master); osc.start();
    setInterval(() => {
      let progress = current / (4 * window.innerHeight);
      if(progress < 0.5 && Math.random() < 0.3) {
        osc.frequency.setValueAtTime(50 + Math.random()*500, actx.currentTime);
      } else if (progress >= 0.5) {
        osc.type = 'sine';
        osc.frequency.setTargetAtTime(220 + progress*200, actx.currentTime, 0.5);
      }
    }, 100);
  }
  isMuted = !isMuted;
  master.gain.value = isMuted ? 0 : 0.2;
};

tick();
</script>
</body>
</html>
