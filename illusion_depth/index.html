<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>illusion_depth</title>
<style>
body, html { margin: 0; padding: 0; background: #0b0c10; color: #66fcf1; font-family: sans-serif; overflow-x: hidden; height: 500vh; perspective: 1000px; }
.layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; will-change: transform; pointer-events: none; }
#mute-btn { position: fixed; top: 20px; right: 20px; z-index: 100; border: 1px solid #45a29e; background: transparent; color: #45a29e; padding: 10px; cursor: pointer; border-radius: 4px; pointer-events: auto; }
</style>
</head>
<body>
<button id="mute-btn">Audio</button>
<div class="layer" id="l1" style="color: #1f2833; z-index: 1;">DEEP</div>
<div class="layer" id="l2" style="color: #45a29e; z-index: 2;">MIDDLE</div>
<div class="layer" id="l3" style="color: #66fcf1; z-index: 3;">SURFACE</div>

<script>
let actx, master, oscs = [];
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { 
    actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination); 
    [100, 200, 400].forEach(f => {
      let o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      let g = actx.createGain(); g.gain.value = 0.1;
      o.connect(g).connect(master); o.start();
      oscs.push(g);
    });
  }
  isMuted = !isMuted;
};

window.addEventListener('scroll', () => {
  let progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  
  // Visual Parallax
  document.getElementById('l1').style.transform = \`translateZ(\${-1000 + progress*500}px) translateY(\${progress*-50}px)\`;
  document.getElementById('l2').style.transform = \`translateZ(\${-500 + progress*200}px) translateY(\${progress*-200}px)\`;
  document.getElementById('l3').style.transform = \`translateZ(\${0}px) translateY(\${progress*-500}px)\`;
  
  // Audio Parallax (Volumes change to simulate depth)
  if(actx && !isMuted) {
    oscs[0].gain.setTargetAtTime(0.1 + progress*0.2, actx.currentTime, 0.1); // Deep gets louder
    oscs[2].gain.setTargetAtTime(0.3 - progress*0.3, actx.currentTime, 0.1); // Surface fades out
  }
});
</script>
</body>
</html>
