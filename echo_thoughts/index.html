<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>echo_thoughts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&display=swap');
body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Cormorant Garamond', serif; overflow-x: hidden; height: 500vh; }
.container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.thought { position: absolute; font-size: 3rem; white-space: nowrap; transform: translate(-50%, -50%); transition: opacity 0.5s; opacity: 0; }
#mute-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; border: 1px solid #fff; background: transparent; color: #fff; padding: 10px; cursor: pointer; border-radius: 50%; width: 50px; height: 50px; }
</style>
</head>
<body>
<button id="mute-btn">🎵</button>
<div class="container" id="cont"></div>
<script>
const variations = [
  "I am not enough.", "Am I not enough?", "I'm never enough.", "Why am I not enough?", "Not enough.", "Enough.", "Am I?", "Never enough."
];

let actx, master, delay, feedback;
let isMuted = true;
let cont = document.getElementById('cont');

document.getElementById('mute-btn').onclick = () => {
  if(!actx) {
    actx = new AudioContext(); 
    master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination);
    delay = actx.createDelay(5.0); delay.delayTime.value = 0.5;
    feedback = actx.createGain(); feedback.gain.value = 0.3;
    delay.connect(feedback); feedback.connect(delay); delay.connect(master);
  }
  isMuted = !isMuted;
};

function playTone(progress) {
  if(!actx || isMuted) return;
  let o = actx.createOscillator(); let g = actx.createGain();
  o.type = 'sine'; o.frequency.value = 300 - progress * 100;
  o.connect(g); g.connect(master); g.connect(delay);
  g.gain.setValueAtTime(0.2, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.5);
  o.start(); o.stop(actx.currentTime + 0.5);
  
  if(delay) delay.delayTime.value = 0.2 + progress * 1.5;
  if(feedback) feedback.gain.value = 0.3 + progress * 0.65;
}

let lastY = 0;
let tCount = 0;

window.addEventListener('scroll', () => {
  let y = window.scrollY;
  let maxScroll = document.body.scrollHeight - window.innerHeight;
  let progress = y / maxScroll;
  
  if(Math.abs(y - lastY) > 100) {
    let el = document.createElement('div');
    el.className = 'thought';
    el.innerText = variations[tCount % variations.length];
    el.style.left = (50 + (Math.random()-0.5)*(progress*100)) + '%';
    el.style.top = (50 + (Math.random()-0.5)*(progress*100)) + '%';
    el.style.transform = \`translate(-50%, -50%) scale(\${1 + progress*2}) rotate(\${(Math.random()-0.5)*progress*45}deg)\`;
    el.style.color = \`rgba(255,255,255,\${1 - progress*0.8})\`;
    cont.appendChild(el);
    
    setTimeout(() => el.style.opacity = 1, 50);
    setTimeout(() => { el.style.opacity = 0; setTimeout(()=>el.remove(), 500); }, 2000 + progress*3000);
    
    playTone(progress);
    lastY = y;
    tCount++;
  }
});
</script>
</body>
</html>
