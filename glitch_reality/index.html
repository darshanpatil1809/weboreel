<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>glitch_reality</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap');
body, html { margin: 0; padding: 0; background: #fff; color: #000; font-family: 'Playfair Display', serif; overflow-x: hidden; height: 500vh; }
.scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
.room { width: 80%; height: 60%; border: 2px solid #000; position: relative; background: #fdfdfd; display: flex; align-items: center; justify-content: center; transition: filter 0.2s; }
.window { position: absolute; right: 20px; top: 20px; width: 100px; height: 150px; border: 2px solid #000; display: flex; flex-direction: column; }
.window-pane { flex: 1; border-bottom: 2px solid #000; }
.window-pane:last-child { border: none; }
.plant { position: absolute; bottom: 0; left: 20px; font-size: 100px; line-height: 1; }
.text { font-size: 2rem; position: absolute; z-index: 10; transition: transform 0.1s; }
#mute-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; border: 1px solid #000; background: transparent; padding: 10px; cursor: pointer; }
.glitch-slice { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; mix-blend-mode: exclusion; }
</style>
</head>
<body>
<button id="mute-btn">Audio</button>
<div class="scene" id="scene">
  <div class="text" id="txt">Everything is perfectly normal.</div>
  <div class="room" id="room">
    <div class="window" id="win"><div class="window-pane"></div><div class="window-pane"></div></div>
    <div class="plant" id="plant">🪴</div>
  </div>
</div>
<script>
let actx, master;
let isMuted = true;

document.getElementById('mute-btn').onclick = () => {
  if(!actx) { actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination); }
  isMuted = !isMuted;
};

function playGlitch(intensity) {
  if(!actx || isMuted || Math.random() > intensity) return;
  let o = actx.createOscillator(); let g = actx.createGain();
  o.type = Math.random() > 0.5 ? 'square' : 'sawtooth';
  o.frequency.value = 50 + Math.random() * 2000;
  o.connect(g).connect(master);
  g.gain.setValueAtTime(0.2 * intensity, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.1);
  o.start(); o.stop(actx.currentTime + 0.1);
}

window.addEventListener('scroll', () => {
  let progress = window.scrollY / (document.body.scrollHeight - window.innerHeight); // 0 to 1
  
  let room = document.getElementById('room');
  let txt = document.getElementById('txt');
  let plant = document.getElementById('plant');
  
  if(progress > 0.2) txt.innerText = "Wait.";
  if(progress > 0.5) txt.innerText = "S0m3th1ng 1s wr0ng.";
  if(progress > 0.8) txt.innerText = "WAKE UP";

  if(progress > 0.1) {
    playGlitch(progress);
    
    // CSS distortions
    if(Math.random() < progress) {
      room.style.transform = \`skew(\${Math.random()*progress*20 - progress*10}deg)\`;
      room.style.filter = \`hue-rotate(\${Math.random()*360}deg) invert(\${progress*100}%)\`;
      txt.style.transform = \`translate(\${Math.random()*progress*50 - progress*25}px, \${Math.random()*progress*50}px)\`;
      document.body.style.background = Math.random() < progress*0.5 ? '#000' : '#fff';
    } else {
      room.style.transform = 'none';
      txt.style.transform = 'none';
      if(progress < 0.8) document.body.style.background = '#fff';
    }
  }
});
</script>
</body>
</html>
