<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>time_fragment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');
body, html { margin: 0; padding: 0; background: #111; color: #fff; font-family: 'Courier Prime', monospace; overflow-x: hidden; height: 600vh; }
.scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.fragment { position: absolute; font-size: 2vw; padding: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; text-align: center; }
#mute-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; border: 1px solid #fff; background: transparent; color: #fff; padding: 10px; cursor: pointer; }
.timeline { position: fixed; bottom: 50px; left: 10%; width: 80%; height: 2px; background: rgba(255,255,255,0.2); }
.timeline-fill { height: 100%; background: #fff; width: 0%; }
</style>
</head>
<body>
<button id="mute-btn">🎵</button>
<div class="scene" id="scene"></div>
<div class="timeline"><div class="timeline-fill" id="fill"></div></div>
<script>
const frags = [
  { t: "08:14", txt: "Coffee spilt." },
  { t: "12:30", txt: "Missed call." },
  { t: "15:45", txt: "The rain started." },
  { t: "18:20", txt: "Train doors closed." },
  { t: "20:05", txt: "Silence in the hall." },
  { t: "23:59", txt: "Another day gone." }
];

let actx, master;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination); playTick(); }
  isMuted = !isMuted;
};

function playTick() {
  if(!isMuted) {
    let o = actx.createOscillator(); let g = actx.createGain();
    o.type = 'square'; o.frequency.setValueAtTime(800, actx.currentTime);
    o.connect(g).connect(master);
    g.gain.setValueAtTime(0.1, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.05);
    o.start(); o.stop(actx.currentTime + 0.05);
  }
  setTimeout(playTick, 1000);
}

function playReverse() {
  if(!actx || isMuted) return;
  let o = actx.createOscillator(); let g = actx.createGain();
  o.type = 'sawtooth'; o.frequency.setValueAtTime(100, actx.currentTime); o.frequency.linearRampToValueAtTime(800, actx.currentTime + 0.5);
  o.connect(g).connect(master);
  g.gain.setValueAtTime(0.01, actx.currentTime); g.gain.linearRampToValueAtTime(0.1, actx.currentTime + 0.4); g.gain.linearRampToValueAtTime(0.01, actx.currentTime + 0.5);
  o.start(); o.stop(actx.currentTime + 0.5);
}

const scene = document.getElementById('scene');
let elements = [];

frags.forEach((f, i) => {
  let el = document.createElement('div');
  el.className = 'fragment';
  el.innerHTML = \`<div>\${f.t}<br><span style="font-size:0.5em;color:#aaa">\${f.txt}</span></div>\`;
  scene.appendChild(el);
  
  let targetX = (i - frags.length/2 + 0.5) * 15; // Target spread out horizontally
  
  elements.push({
    el,
    tx: targetX, ty: 0, 
    sx: (Math.random()-0.5)*100, sy: (Math.random()-0.5)*100, 
    sr: (Math.random()-0.5)*360
  });
});

let lastP = 0;
window.addEventListener('scroll', () => {
  let progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  document.getElementById('fill').style.width = (progress * 100) + '%';
  
  if(Math.abs(progress - lastP) > 0.1) {
    playReverse();
    lastP = progress;
  }
  
  elements.forEach(e => {
    let p = Math.min(1, Math.max(0, progress));
    let x = e.sx * (1-p) + e.tx * p;
    let y = e.sy * (1-p) + e.ty * p;
    let r = e.sr * (1-p);
    let blur = (1-p)*10;
    
    e.el.style.transform = \`translate(\${x}vw, \${y}vh) rotate(\${r}deg)\`;
    e.el.style.filter = \`blur(\${blur}px)\`;
    e.el.style.opacity = 0.2 + p * 0.8;
  });
});

// Init layout
window.dispatchEvent(new Event('scroll'));
</script>
</body>
</html>
