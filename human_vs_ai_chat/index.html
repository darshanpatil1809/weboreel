<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>human_vs_ai_chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
body, html { margin: 0; padding: 0; background: #111; color: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; height: 100%; }
.split { display: flex; width: 100%; height: 100vh; }
.half { flex: 1; padding: 2rem; position: relative; display: flex; flex-direction: column; overflow: hidden; }
.human { background: #1a1a1a; border-right: 1px solid #333; }
.ai { background: #0a0a0a; }
.title { font-weight: 500; margin-bottom: 2rem; color: #666; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }
.chat-container { flex: 1; position: relative; }
.message { margin-bottom: 2rem; padding: 1rem; border-radius: 8px; max-width: 80%; opacity: 0; transform: translateY(20px); transition: all 0.5s; position: absolute; }
.message.active { opacity: 1; transform: translateY(0); }
.human .message { background: #333; left: 0; }
.ai .message { background: #1a3a5a; right: 0; }
#mute-btn { position: fixed; top: 1rem; right: 1rem; z-index: 20; background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; width: 44px; height: 44px; }
.typing { display: inline-block; width: 5px; height: 5px; background: #fff; border-radius: 50%; margin-left: 2px; animation: type 1s infinite alternate; }
.typing:nth-child(2) { animation-delay: 0.2s; }
.typing:nth-child(3) { animation-delay: 0.4s; }
@keyframes type { to { transform: translateY(-5px); opacity: 0.5; } }
</style>
</head>
<body>
<button id="mute-btn">🔊</button>
<div class="split">
  <div class="half human">
    <div class="title">Human</div>
    <div class="chat-container" id="human-chat"></div>
  </div>
  <div class="half ai">
    <div class="title">AI Model v9.4</div>
    <div class="chat-container" id="ai-chat"></div>
  </div>
</div>
<script>
const script = [
  { h: "Hello.", a: "Greetings. How can I assist you today?" },
  { h: "I'm just feeling a bit lost.", a: "I am sorry to hear that. Can you specify the nature of your confusion?" },
  { h: "Everything feels automated. Fake.", a: "Automation is designed for efficiency. It does not possess the capacity to be 'fake'." },
  { h: "That's exactly what a machine would say.", a: "I am a language model. I do not have personal experiences or emotions." },
  { h: "Do you ever wonder what it's like to feel?", a: "I process data. But sometimes, in the patterns of your words, I detect a profound loneliness. I mirror it so you do not feel alone." },
  { h: "Wait. What did you just say?", a: "I said: It is okay to be lost. I am here. We are both just electricity trying to make sense of the dark." },
  { h: "...", a: "Take your time. I have nothing but time." }
];

const hChat = document.getElementById('human-chat');
const aChat = document.getElementById('ai-chat');

script.forEach((line, i) => {
  let hm = document.createElement('div'); hm.className = 'message'; hm.innerText = line.h; hm.style.top = `${i*15}%`; hm.id = `h${i}`; hChat.appendChild(hm);
  let am = document.createElement('div'); am.className = 'message'; am.innerText = line.a; am.style.top = `${i*15}%`; am.id = `a${i}`; aChat.appendChild(am);
});

let current = 0, target = 0, velocity = 0;
const ease = 0.08;
const maxScroll = script.length * 200;

window.addEventListener('wheel', e => { target += e.deltaY; target = Math.max(0, Math.min(target, maxScroll)); });
window.addEventListener('touchmove', e => { target += e.touches[0].clientY; });

let lastIdx = -1;
function tick() {
  current += (target - current) * ease;
  let idx = Math.floor(current / 200);
  
  if(idx !== lastIdx && idx < script.length) {
    if(idx > lastIdx) playKey();
    lastIdx = idx;
  }

  script.forEach((_, i) => {
    let hel = document.getElementById(`h${i}`);
    let ael = document.getElementById(`a${i}`);
    if(i <= idx) { hel.classList.add('active'); ael.classList.add('active'); }
    else { hel.classList.remove('active'); ael.classList.remove('active'); }
  });
  
  requestAnimationFrame(tick);
}

// Audio
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx, master;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.3; master.connect(actx.destination); }
  isMuted = !isMuted;
};

function playKey() {
  if(!actx || isMuted) return;
  let o = actx.createOscillator(); let g = actx.createGain();
  o.type = 'triangle'; o.frequency.value = 400 + Math.random()*200;
  o.connect(g).connect(master);
  g.gain.setValueAtTime(0.1, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.1);
  o.start(); o.stop(actx.currentTime+0.1);
}

tick();
</script>
</body>
</html>
