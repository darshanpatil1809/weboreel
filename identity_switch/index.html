<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>identity_switch</title>
<style>
body, html { margin: 0; padding: 0; height: 100%; overflow-x: hidden; scroll-behavior: smooth; }
.section { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: all 1s; position: relative; overflow: hidden; }
/* Corporate */
#s1 { background: #fff; color: #333; font-family: 'Helvetica', sans-serif; }
#s1 .title { font-size: 3rem; font-weight: 700; letter-spacing: -1px; }
#s1 .sub { color: #888; margin-top: 10px; }
/* Gamer */
#s2 { background: #0a0a0a; color: #0f0; font-family: 'Courier New', monospace; box-shadow: inset 0 0 50px #0f0; }
#s2 .title { font-size: 4rem; text-shadow: 2px 2px 0px #f0f, -2px -2px 0px #0ff; }
/* Artist */
#s3 { background: #faf4e8; color: #5c4a3d; font-family: 'Georgia', serif; }
#s3 .title { font-size: 5rem; font-style: italic; }
#s3::before { content: ''; position: absolute; top:0;left:0;right:0;bottom:0; background: radial-gradient(circle, transparent 20%, #faf4e8 150%); opacity: 0.5; pointer-events: none; }
/* Blank */
#s4 { background: #000; color: #fff; font-family: sans-serif; }
#s4 .title { font-size: 1rem; opacity: 0.5; }

#mute-btn { position: fixed; top: 20px; right: 20px; z-index: 100; border: none; padding: 15px; border-radius: 50%; cursor: pointer; background: rgba(128,128,128,0.2); backdrop-filter: blur(5px); }
</style>
</head>
<body>
<button id="mute-btn">Audio</button>

<div class="section" id="s1">
  <div class="title">Director of Strategy</div>
  <div class="sub">Quarterly Review | Q3</div>
</div>
<div class="section" id="s2">
  <div class="title">xX_Shad0w_Xx</div>
  <div class="sub">Level 99 | K/D: 3.4</div>
</div>
<div class="section" id="s3">
  <div class="title">Wandering Soul</div>
  <div class="sub">Poetry & Light</div>
</div>
<div class="section" id="s4">
  <div class="title">Who are you?</div>
</div>

<script>
let actx, master;
let oscs = [];
let isMuted = true;

document.getElementById('mute-btn').onclick = () => {
  if(!actx) { 
    actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination); 
    setupAudio();
  }
  isMuted = !isMuted;
  if(master) master.gain.setTargetAtTime(isMuted ? 0 : 0.5, actx.currentTime, 0.1);
};

function setupAudio() {
  // s1: pure sine tone (clean)
  let o1 = actx.createOscillator(); let g1 = actx.createGain(); o1.type = 'sine'; o1.frequency.value = 440; o1.connect(g1).connect(master); g1.gain.value = 0; o1.start();
  // s2: sawtooth synth (gamer)
  let o2 = actx.createOscillator(); let g2 = actx.createGain(); o2.type = 'sawtooth'; o2.frequency.value = 110; o2.connect(g2).connect(master); g2.gain.value = 0; o2.start();
  // s3: soft triangle (ambient)
  let o3 = actx.createOscillator(); let g3 = actx.createGain(); o3.type = 'triangle'; o3.frequency.value = 329.63; o3.connect(g3).connect(master); g3.gain.value = 0; o3.start();
  // s4: low noise rumble
  let o4 = actx.createOscillator(); let g4 = actx.createGain(); o4.type = 'sine'; o4.frequency.value = 50; o4.connect(g4).connect(master); g4.gain.value = 0; o4.start();
  
  oscs = [g1, g2, g3, g4];
  updateAudio(0);
}

function updateAudio(index) {
  if(!actx) return;
  oscs.forEach((g, i) => {
    g.gain.setTargetAtTime(i === index ? 0.3 : 0, actx.currentTime, 0.5);
  });
}

window.addEventListener('scroll', () => {
  let vh = window.innerHeight;
  let y = window.scrollY;
  let index = Math.round(y / vh);
  index = Math.max(0, Math.min(3, index));
  updateAudio(index);
});
</script>
</body>
</html>
