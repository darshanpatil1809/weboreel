<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-width=1.0">
<title>The Waiting Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-white: #f0f0f2;
    --door: #d1d1d6;
    --led-red: #ff3333;
    --led-off: #441111;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body, html {
    background-color: var(--bg-white);
    color: #333;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Infinite white void effect */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, #fff 0%, var(--bg-white) 70%, #e0e0e4 100%);
    z-index: -2;
  }

  /* Floor reflection/shadow */
  body::after {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0; height: 30vh;
    background: linear-gradient(to top, rgba(0,0,0,0.05), transparent);
    z-index: -1;
  }

  .scene {
    position: relative;
    width: 800px;
    height: 600px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }

  /* The Door */
  .door-frame {
    position: absolute;
    bottom: 50px;
    width: 200px;
    height: 400px;
    background: #e5e5e8;
    border: 1px solid #ccc;
    box-shadow: 
      inset 5px 5px 15px rgba(255,255,255,1),
      inset -5px -5px 15px rgba(0,0,0,0.1),
      20px 0 30px rgba(0,0,0,0.05);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .door {
    width: 180px;
    height: 380px;
    background: var(--door);
    border: 1px solid #c0c0c5;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
  }

  .doorknob {
    position: absolute;
    top: 50%; right: 15px;
    width: 15px; height: 15px;
    background: #aaa;
    border-radius: 50%;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
  }

  /* LED Sign */
  .led-sign {
    position: absolute;
    top: -80px;
    background: #111;
    border: 4px solid #222;
    border-radius: 4px;
    padding: 10px 20px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }

  .led-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--led-red);
    margin-bottom: 5px;
    letter-spacing: 0.1em;
    text-shadow: 0 0 5px var(--led-red);
  }

  .led-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: 3rem;
    color: var(--led-red);
    text-shadow: 0 0 10px var(--led-red), 0 0 20px var(--led-red);
    line-height: 1;
  }

  /* Dispenser */
  .dispenser-stand {
    position: absolute;
    bottom: 50px;
    left: 100px;
    width: 80px;
    height: 250px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pole {
    width: 10px;
    height: 150px;
    background: linear-gradient(90deg, #ccc, #eee, #999);
    margin-top: auto;
  }

  .dispenser-head {
    width: 80px;
    height: 100px;
    background: #cc2222;
    border-radius: 10px 10px 5px 5px;
    box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 5px 10px 15px rgba(0,0,0,0.1);
    position: relative;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .dispenser-head:active {
    transform: translateY(2px);
  }

  .ticket-slot {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 5px;
    background: #111;
    border-radius: 2px;
  }

  /* Tickets */
  .ticket {
    position: absolute;
    bottom: -40px; left: 50%;
    transform: translateX(-50%);
    width: 38px; height: 50px;
    background: #fff;
    border: 1px solid #ddd;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  
  .ticket-anim {
    animation: printTicket 0.5s ease-out forwards;
  }

  @keyframes printTicket {
    0% { height: 0; bottom: 10px; opacity: 0; }
    100% { height: 50px; bottom: -40px; opacity: 1; }
  }

  .ticket-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: #333;
    transform: rotate(-90deg);
  }

  /* User's Ticket Display */
  .my-ticket-overlay {
    position: fixed;
    bottom: 2rem; right: 2rem;
    width: 150px; height: 200px;
    background: #fff;
    border: 2px solid #ccc;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transform: translateY(150%) rotate(10deg);
    transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
    z-index: 50;
  }

  .my-ticket-overlay.active {
    transform: translateY(0) rotate(-5deg);
  }

  .my-ticket-title {
    font-size: 0.8rem;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 1rem;
    letter-spacing: 0.1em;
  }

  .my-ticket-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2rem;
    color: #111;
    font-weight: bold;
  }

  .audio-toggle {
    position: absolute;
    top: 2rem; right: 2rem;
    background: none;
    border: 1px solid #ccc;
    border-radius: 50%;
    width: 40px; height: 40px;
    color: #666;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex; justify-content: center; align-items: center;
    z-index: 100;
  }

</style>
</head>
<body>

  <button class="audio-toggle" onclick="toggleMute()" id="mute-btn">🎵</button>

  <div class="scene">
    <div class="dispenser-stand">
      <div class="dispenser-head" onclick="takeTicket()">
        <div class="ticket-slot"></div>
        <div class="ticket" id="dispenser-ticket" style="opacity:0;">
          <div class="ticket-num">TICKET</div>
        </div>
      </div>
      <div class="pole"></div>
    </div>

    <div class="door-frame">
      <div class="led-sign">
        <div class="led-text">NOW SERVING</div>
        <div class="led-number" id="now-serving">00</div>
      </div>
      <div class="door">
        <div class="doorknob"></div>
      </div>
    </div>
  </div>

  <div class="my-ticket-overlay" id="my-ticket">
    <div class="my-ticket-title">YOUR NUMBER</div>
    <div class="my-ticket-num">999,999,999</div>
  </div>

<script>
  // Logic
  const servingDisplay = document.getElementById('now-serving');
  const myTicketOverlay = document.getElementById('my-ticket');
  const dispenserTicket = document.getElementById('dispenser-ticket');
  
  let currentServing = 0;
  let hasTicket = false;
  let servingInterval;

  function pad(num) {
    return num.toString().padStart(2, '0');
  }

  function startServing() {
    // Increments absurdly slowly, random intervals between 15s and 45s
    const nextTime = Math.random() * 30000 + 15000;
    servingInterval = setTimeout(() => {
      currentServing++;
      servingDisplay.innerText = pad(currentServing);
      playDing();
      startServing();
    }, nextTime);
  }

  function takeTicket() {
    if(!audioInit && !isMuted) initAudio();
    if (hasTicket) return;
    
    hasTicket = true;
    playPrintSound();
    
    // Animate mini ticket out of dispenser
    dispenserTicket.classList.add('ticket-anim');
    
    setTimeout(() => {
      dispenserTicket.style.opacity = 0;
      dispenserTicket.classList.remove('ticket-anim');
      myTicketOverlay.classList.add('active');
    }, 600);
  }

  // Audio System
  let audioCtx;
  let isMuted = false;
  let audioInit = false;
  let masterGain, muzakGain;

  async function initAudio() {
    if (audioInit) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);

    // Degraded Muzak generation
    muzakGain = audioCtx.createGain();
    muzakGain.gain.value = isMuted ? 0 : 0.15;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800; // telephone EQ
    filter.Q.value = 1;
    
    muzakGain.connect(filter);
    filter.connect(masterGain);

    playMuzak(); // Start generative muzak loop
    startServing(); // Start the sign
    
    audioInit = true;
  }

  function toggleMute() {
    if (!audioInit) initAudio();
    isMuted = !isMuted;
    if (muzakGain) muzakGain.gain.setTargetAtTime(isMuted ? 0 : 0.15, audioCtx.currentTime, 0.1);
    document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🎵';
  }

  function playMuzak() {
    // Generative simple bossa nova / elevator music chords
    const chords = [
      [261.63, 329.63, 392.00, 493.88], // Cmaj7
      [220.00, 261.63, 329.63, 392.00], // Am7
      [174.61, 220.00, 261.63, 329.63], // Fmaj7
      [196.00, 246.94, 293.66, 349.23]  // G7
    ];
    
    let step = 0;
    
    setInterval(() => {
      if (!audioInit || isMuted) return;
      const t = audioCtx.currentTime;
      const chord = chords[step % chords.length];
      
      // Pitch shifted down slightly for warble effect (simulated via LFO on playback rate if it were samples, 
      // but here we just detune oscs randomly)
      const detune = Math.sin(t) * 10 - 20; // slow warble
      
      chord.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = i % 2 === 0 ? 'sine' : 'triangle';
        osc.frequency.value = freq;
        osc.detune.value = detune;
        
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.05, t + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 1.9);
        
        osc.connect(gain);
        gain.connect(muzakGain);
        osc.start(t);
        osc.stop(t + 2);
      });
      
      // Cheesy ride cymbal tick
      const noise = audioCtx.createBufferSource();
      const bSize = audioCtx.sampleRate * 0.1;
      const buff = audioCtx.createBuffer(1, bSize, audioCtx.sampleRate);
      const data = buff.getChannelData(0);
      for(let i=0; i<bSize; i++) data[i] = Math.random()*2-1;
      noise.buffer = buff;
      const nFilt = audioCtx.createBiquadFilter();
      nFilt.type = 'highpass';
      nFilt.frequency.value = 5000;
      const nGain = audioCtx.createGain();
      nGain.gain.setValueAtTime(0.02, t);
      nGain.gain.exponentialRampToValueAtTime(0.001, t+0.1);
      noise.connect(nFilt); nFilt.connect(nGain); nGain.connect(muzakGain);
      noise.start(t);

      step++;
    }, 2000); // 30 BPM
  }

  function playDing() {
    if (!audioInit || isMuted) return;
    const t = audioCtx.currentTime;
    
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc1.type = 'sine';
    osc2.type = 'sine';
    osc1.frequency.setValueAtTime(880, t); // A5
    osc2.frequency.setValueAtTime(1046.50, t + 0.2); // C6 slightly delayed for classic two-tone ding
    
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.6, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    
    osc1.connect(gain);
    // osc2 routing delayed
    const gain2 = audioCtx.createGain();
    gain2.gain.setValueAtTime(0, t);
    gain2.gain.setValueAtTime(0.6, t + 0.2);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.7);
    osc2.connect(gain2);
    
    gain.connect(masterGain);
    gain2.connect(masterGain);
    
    osc1.start(t); osc1.stop(t + 1.5);
    osc2.start(t+0.2); osc2.stop(t + 1.7);
  }

  function playPrintSound() {
    if (!audioInit || isMuted) return;
    const t = audioCtx.currentTime;
    
    const bufferSize = audioCtx.sampleRate * 0.5;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1500;
    
    const gain = audioCtx.createGain();
    // Simulate chug-chug print noise
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.setValueAtTime(0.01, t+0.1);
    gain.gain.setValueAtTime(0.1, t+0.2);
    gain.gain.setValueAtTime(0.01, t+0.3);
    gain.gain.setValueAtTime(0.1, t+0.4);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.5);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start(t);
  }

  document.body.addEventListener('click', () => {
    if(!audioInit && !isMuted) initAudio();
  }, {once:true});

</script>
</body>
</html>
