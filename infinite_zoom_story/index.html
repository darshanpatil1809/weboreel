<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>infinite_zoom_story</title>
<style>
body, html { margin: 0; padding: 0; background: #000; overflow-x: hidden; height: 1000vh; font-family: 'Helvetica Neue', sans-serif; }
.viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; transform-origin: center center; }
.zoom-layer { position: absolute; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
.text { color: #fff; font-size: 2vw; text-align: center; }
#mute-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; border: none; background: #fff; color: #000; cursor: pointer; padding: 10px; border-radius: 5px; }
</style>
</head>
<body>
<button id="mute-btn">🎵</button>
<div class="viewport" id="vp">
  <!-- Generated by JS -->
</div>

<script>
let actx, master, osc;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { 
    actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.3; master.connect(actx.destination); 
    osc = actx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 200; osc.connect(master); osc.start();
  }
  isMuted = !isMuted;
  if(master) master.gain.setTargetAtTime(isMuted ? 0 : 0.3, actx.currentTime, 0.5);
};

const vp = document.getElementById('vp');
const story = ["The Universe", "The Galaxy", "The Star", "The Planet", "The City", "The House", "The Room", "The Person", "The Mind", "The Thought"];

for(let i=0; i<story.length; i++) {
  let l = document.createElement('div');
  l.className = 'zoom-layer';
  // Each layer is exponentially smaller than the previous
  let size = 100 / Math.pow(2, i);
  l.style.width = size + 'vw';
  l.style.height = size + 'vw';
  l.innerHTML = \`<div class="text" style="font-size: \${size/10}vw">\${story[i]}</div>\`;
  vp.appendChild(l);
}

window.addEventListener('scroll', () => {
  let progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  // Scale exponentially up to 2^9 = 512
  let scale = Math.pow(2, progress * 9);
  vp.style.transform = \`scale(\${scale})\`;
  
  if(actx && !isMuted) {
    // Pitch goes up as we zoom in
    osc.frequency.setTargetAtTime(200 * scale, actx.currentTime, 0.1);
  }
});
</script>
</body>
</html>
