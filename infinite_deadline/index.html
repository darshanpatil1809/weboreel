<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>infinite_deadline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
body, html { margin: 0; padding: 0; background: #111; color: #ff3333; font-family: 'Courier Prime', monospace; overflow-x: hidden; height: 1000vh; }
.timer-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; pointer-events: none; }
.timer { font-size: 8rem; font-weight: bold; text-shadow: 0 0 20px rgba(255,51,51,0.5); }
.ms { font-size: 3rem; }
.task-grid { position: absolute; top: 0; left: 0; width: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px; z-index: 1; }
.task { background: #222; border: 1px solid #333; padding: 15px; font-size: 14px; color: #aaa; opacity: 0; transition: opacity 0.5s; transform: scale(0.9); }
.task.active { opacity: 1; transform: scale(1); border-color: #ff3333; }
.task input[type="checkbox"] { margin-right: 10px; pointer-events: none; }
#mute-btn { position: fixed; bottom: 20px; right: 20px; background: transparent; border: 1px solid #ff3333; color: #ff3333; padding: 10px; cursor: pointer; z-index: 100; font-family: inherit; }
.shake { animation: shake 0.5s infinite; }
@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
</style>
</head>
<body>
<button id="mute-btn">AUDIO</button>
<div class="timer-container" id="tc">
  <div class="timer" id="timer">00:00:<span class="ms" id="ms">00</span></div>
</div>
<div class="task-grid" id="grid"></div>
<script>
let timeLeft = 59.99;
const timerEl = document.getElementById('timer');
const msEl = document.getElementById('ms');
const grid = document.getElementById('grid');

// Generate tasks
for(let i=0; i<200; i++) {
  let t = document.createElement('div');
  t.className = 'task';
  t.innerHTML = `<input type="checkbox"> Task ID: ${Math.random().toString(36).substr(2, 6).toUpperCase()}<br>Due: ASAP`;
  t.id = `t${i}`;
  grid.appendChild(t);
}

let actx, master;
let isMuted = true;
let lastTick = 0;

document.getElementById('mute-btn').onclick = () => {
  if(!actx) { actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination); }
  isMuted = !isMuted;
};

function playTick() {
  if(!actx || isMuted) return;
  let o = actx.createOscillator(); let g = actx.createGain();
  o.type = 'triangle'; o.frequency.value = 1000;
  o.connect(g).connect(master);
  g.gain.setValueAtTime(0.5, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.05);
  o.start(); o.stop(actx.currentTime + 0.05);
}

function update() {
  // Decrease time
  timeLeft -= 0.03; // Real time but fake
  if(timeLeft <= 0) timeLeft = 59.99; // Infinite loop
  
  let s = Math.floor(timeLeft);
  let ms = Math.floor((timeLeft - s) * 100);
  timerEl.innerHTML = \`00:\${s.toString().padStart(2,'0')}:<span class="ms">\${ms.toString().padStart(2,'0')}</span>\`;
  
  if(Math.floor(timeLeft) !== lastTick) {
    playTick();
    lastTick = Math.floor(timeLeft);
  }
  
  requestAnimationFrame(update);
}

window.addEventListener('scroll', () => {
  let y = window.scrollY;
  let activeCount = Math.floor(y / 50);
  
  if(activeCount > 50) document.getElementById('tc').classList.add('shake');
  else document.getElementById('tc').classList.remove('shake');
  
  for(let i=0; i<200; i++) {
    let t = document.getElementById(\`t\${i}\`);
    if(i < activeCount) t.classList.add('active');
    else t.classList.remove('active');
  }
});

update();
</script>
</body>
</html>
