<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dopamine_loop</title>
<style>
body, html { margin: 0; padding: 0; background: #111; overflow-x: hidden; height: 1000vh; font-family: sans-serif; transition: background 0.1s; }
.pull-to-refresh { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); color: #555; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
.reward { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 10rem; opacity: 0; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; pointer-events: none; }
.reward.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
#mute-btn { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; border: none; padding: 10px; border-radius: 20px; cursor: pointer; z-index: 100; }
.flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 50; }
</style>
</head>
<body>
<button id="mute-btn">🎵</button>
<div class="pull-to-refresh">Keep scrolling</div>
<div class="reward" id="reward">🎁</div>
<div class="flash" id="flash"></div>
<script>
let actx, master;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination); }
  isMuted = !isMuted;
};

function playReward() {
  if(!actx || isMuted) return;
  const freqs = [440, 554.37, 659.25, 880]; // A major arpeggio
  let t = actx.currentTime;
  freqs.forEach((f, i) => {
    let o = actx.createOscillator(); let g = actx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    o.connect(g).connect(master);
    g.gain.setValueAtTime(0, t + i*0.1);
    g.gain.linearRampToValueAtTime(0.3, t + i*0.1 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.01, t + i*0.1 + 0.3);
    o.start(t + i*0.1); o.stop(t + i*0.1 + 0.3);
  });
}

function playEmpty() {
  if(!actx || isMuted) return;
  let o = actx.createOscillator(); let g = actx.createGain();
  o.type = 'sine'; o.frequency.value = 100;
  o.connect(g).connect(master);
  g.gain.setValueAtTime(0.2, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 1);
  o.start(); o.stop(actx.currentTime + 1);
}

const emojis = ["💎", "💰", "🎰", "🔥", "❤️", "🏆", "🔔"];
let lastY = 0;
let nextThreshold = 500;
let hits = 0;

window.addEventListener('scroll', () => {
  let y = window.scrollY;
  let progress = y / (document.body.scrollHeight - window.innerHeight);
  
  if(y > nextThreshold) {
    // Determine if reward or empty
    let chance = 1 - progress; // gets rarer
    let rewardEl = document.getElementById('reward');
    let flashEl = document.getElementById('flash');
    
    if(Math.random() < chance) {
      // Hit!
      rewardEl.innerText = emojis[Math.floor(Math.random()*emojis.length)];
      rewardEl.classList.add('active');
      flashEl.style.opacity = 1;
      setTimeout(() => flashEl.style.opacity = 0, 100);
      setTimeout(() => rewardEl.classList.remove('active'), 500);
      playReward();
    } else {
      // Miss
      document.body.style.background = "#050505";
      setTimeout(() => document.body.style.background = "#111", 200);
      playEmpty();
    }
    
    hits++;
    nextThreshold = y + 300 + Math.random() * 800 * (1+progress); // distance increases
  }
  
  if(progress > 0.9) {
    document.querySelector('.pull-to-refresh').innerText = "Nothing left.";
    document.querySelector('.pull-to-refresh').style.color = "#222";
  }
});
</script>
</body>
</html>
