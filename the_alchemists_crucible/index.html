<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-width=1.0">
<title>The Alchemist's Crucible</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Metamorphous&display=swap" rel="stylesheet">
<style>
  :root {
    --stone-dark: #1a1a1a;
    --stone-light: #2a2a2a;
    --cauldron-iron: #111;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body, html {
    background-color: var(--stone-dark);
    color: #e0d8c8;
    font-family: 'Metamorphous', cursive;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }

  /* Stone Cellar Background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 60%),
      repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(0,0,0,0.2) 20px, rgba(0,0,0,0.2) 40px);
    z-index: -2;
    pointer-events: none;
  }

  /* UI Title */
  .title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 3rem;
    color: #b5a642; /* Brass */
    text-shadow: 0 0 20px rgba(181, 166, 66, 0.5);
    margin-top: 2rem;
    z-index: 10;
  }

  .instruction {
    font-size: 1rem;
    color: rgba(224, 216, 200, 0.6);
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
    z-index: 10;
  }

  /* The Shelf */
  .shelf {
    position: absolute;
    top: 15%; right: 5%;
    width: 250px;
    height: 400px;
    background: #2a1a10;
    border: 5px solid #1a0a05;
    box-shadow: 10px 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.9);
    border-radius: 10px;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    padding: 20px;
    gap: 20px;
    z-index: 20;
  }

  /* Shelf boards */
  .shelf::after {
    content: ''; position: absolute; top: 33%; left: 0; width: 100%; height: 10px; background: #1a0a05;
    box-shadow: 0 5px 5px rgba(0,0,0,0.5);
  }
  .shelf::before {
    content: ''; position: absolute; top: 66%; left: 0; width: 100%; height: 10px; background: #1a0a05;
    box-shadow: 0 5px 5px rgba(0,0,0,0.5);
  }

  /* Ingredients */
  .ingredient {
    width: 40px; height: 60px;
    border-radius: 20px 20px 5px 5px;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 5px 10px rgba(0,0,0,0.5);
    cursor: grab;
    position: relative;
    z-index: 25;
    transition: transform 0.1s;
  }
  
  .ingredient.dragging {
    cursor: grabbing;
    opacity: 0.8;
    z-index: 100;
  }

  /* Specific Flasks */
  .flask-red { background: radial-gradient(circle at 30% 30%, #ff6666, #cc0000); box-shadow: 0 0 15px #cc0000; }
  .flask-blue { background: radial-gradient(circle at 30% 30%, #6666ff, #0000cc); box-shadow: 0 0 15px #0000cc; }
  .flask-green { background: radial-gradient(circle at 30% 30%, #66ff66, #00cc00); box-shadow: 0 0 15px #00cc00; }
  .flask-gold { background: radial-gradient(circle at 30% 30%, #ffff66, #cccc00); box-shadow: 0 0 15px #cccc00; border-radius: 5px; height: 40px; margin-top: 20px;}
  .flask-void { background: radial-gradient(circle at 30% 30%, #660066, #110011); box-shadow: 0 0 15px #660066; border-radius: 50%; width: 50px; height: 50px; }

  /* Cauldron Area */
  .cauldron-area {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 400px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    z-index: 5;
  }

  .cauldron-body {
    width: 300px;
    height: 200px;
    background: radial-gradient(circle at 30% 20%, #333, #000);
    border-radius: 0 0 150px 150px;
    border: 5px solid #222;
    border-top: 15px solid #111;
    box-shadow: inset -20px -20px 40px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.8);
    position: relative;
    z-index: 10;
  }

  .cauldron-opening {
    position: absolute;
    top: -30px; left: -5px;
    width: 300px; height: 60px;
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%);
    border-radius: 50%;
    border: 5px solid #222;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
    z-index: 11;
    overflow: hidden;
  }

  /* The actual boiling liquid surface */
  .liquid {
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border-radius: 50%;
    background: var(--liquid-color, #222);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    transition: background 2s;
  }

  /* Fire under cauldron */
  .fire {
    position: absolute;
    bottom: -20px; left: 50%;
    transform: translateX(-50%);
    width: 150px; height: 50px;
    background: radial-gradient(ellipse at bottom, #ff9900 0%, #ff3300 40%, transparent 70%);
    filter: blur(10px);
    animation: flicker 1s infinite alternate;
    z-index: 5;
  }

  @keyframes flicker {
    0% { opacity: 0.8; transform: translateX(-50%) scale(1); }
    100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
  }

  /* Smoke Canvas */
  canvas#smoke {
    position: absolute;
    bottom: 150px; /* Above cauldron */
    left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 500px;
    z-index: 6;
    pointer-events: none;
    filter: blur(8px);
  }

  /* Flash overlay */
  .flash-overlay {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 1000;
  }
  .flash-overlay.active {
    animation: flashAnim 1s ease-out;
  }
  @keyframes flashAnim {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  .audio-toggle {
    position: absolute;
    top: 2rem; left: 2rem;
    background: rgba(10,10,12,0.8);
    border: 1px solid #b5a642;
    border-radius: 50%;
    width: 50px; height: 50px;
    color: #b5a642;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex; justify-content: center; align-items: center;
    z-index: 100;
  }

</style>
</head>
<body>

  <div class="title">The Crucible</div>
  <div class="instruction">DRAG INGREDIENTS TO THE CAULDRON</div>
  
  <button class="audio-toggle" onclick="toggleMute()" id="mute-btn">🕯️</button>

  <div class="shelf" id="shelf">
    <!-- Ingredients cloned via JS to allow infinite supply -->
  </div>

  <div class="cauldron-area">
    <canvas id="smoke"></canvas>
    <div class="cauldron-body" id="cauldron">
      <div class="cauldron-opening">
        <div class="liquid" id="liquid" style="--liquid-color: #222;"></div>
      </div>
      <div class="fire"></div>
    </div>
  </div>

  <div class="flash-overlay" id="flash"></div>

<script>
  // Ingredient Logic
  const shelf = document.getElementById('shelf');
  const types = ['flask-red', 'flask-blue', 'flask-green', 'flask-gold', 'flask-void'];
  
  function populateShelf() {
    shelf.innerHTML = '';
    types.forEach((type, i) => {
      const el = document.createElement('div');
      el.className = `ingredient ${type}`;
      el.dataset.type = type;
      // Position roughly on shelves
      el.style.marginTop = i > 2 ? '30px' : '0'; 
      shelf.appendChild(el);
      makeDraggable(el);
    });
  }
  populateShelf();

  let draggedEl = null;
  let startX, startY;
  let initialX, initialY;

  function makeDraggable(el) {
    el.addEventListener('mousedown', (e) => {
      draggedEl = el;
      initialX = el.getBoundingClientRect().left;
      initialY = el.getBoundingClientRect().top;
      startX = e.clientX;
      startY = e.clientY;
      
      el.classList.add('dragging');
      // Move to body so it escapes shelf overflow and z-index issues
      el.style.position = 'absolute';
      el.style.left = `${initialX}px`;
      el.style.top = `${initialY}px`;
      document.body.appendChild(el);
      
      if(!audioInit && !isMuted) initAudio();
    });
  }

  window.addEventListener('mousemove', (e) => {
    if (!draggedEl) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    draggedEl.style.transform = `translate(${dx}px, ${dy}px)`;
  });

  window.addEventListener('mouseup', (e) => {
    if (!draggedEl) return;
    
    // Check if over cauldron opening
    const cauldronRect = document.querySelector('.cauldron-opening').getBoundingClientRect();
    const ex = e.clientX;
    const ey = e.clientY;
    
    if (ex > cauldronRect.left && ex < cauldronRect.right && ey > cauldronRect.top && ey < cauldronRect.bottom) {
      // Dropped in!
      handleDrop(draggedEl.dataset.type);
      draggedEl.remove();
      playPlop();
    } else {
      // Return to shelf
      draggedEl.remove();
    }
    
    draggedEl = null;
    populateShelf(); // reset shelf
  });

  // Alchemy Logic
  let currentMix = [];
  const liquid = document.getElementById('liquid');
  let smokeColor = {r: 50, g: 50, b: 50};

  function handleDrop(type) {
    currentMix.push(type);
    if(currentMix.length > 3) currentMix.shift(); // Keep last 3
    
    // Determine color
    let r=0, g=0, b=0;
    currentMix.forEach(t => {
      if(t==='flask-red') { r+=200; }
      if(t==='flask-blue') { b+=200; }
      if(t==='flask-green') { g+=200; }
      if(t==='flask-gold') { r+=150; g+=150; }
      if(t==='flask-void') { r-=100; g-=100; b-=100; }
    });
    
    const count = currentMix.length;
    r = Math.max(0, Math.min(255, Math.floor(r/count)));
    g = Math.max(0, Math.min(255, Math.floor(g/count)));
    b = Math.max(0, Math.min(255, Math.floor(b/count)));
    
    liquid.style.setProperty('--liquid-color', `rgb(${r},${g},${b})`);
    smokeColor = {r, g, b};
    
    // Boom logic (e.g. Red + Blue + Gold)
    if (currentMix.includes('flask-red') && currentMix.includes('flask-blue') && currentMix.includes('flask-gold')) {
      playBoom();
      document.getElementById('flash').classList.add('active');
      setTimeout(()=> document.getElementById('flash').classList.remove('active'), 1000);
      currentMix = []; // Reset
      liquid.style.setProperty('--liquid-color', `#222`);
      smokeColor = {r: 50, g: 50, b: 50};
    }
  }

  // Smoke Canvas System
  const canvas = document.getElementById('smoke');
  const ctx = canvas.getContext('2d');
  canvas.width = 400;
  canvas.height = 500;
  
  let particles = [];
  
  function spawnParticle() {
    particles.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 100,
      y: canvas.height,
      vx: (Math.random() - 0.5) * 2,
      vy: Math.random() * -2 - 1,
      r: Math.random() * 20 + 20,
      life: 1,
      c: {...smokeColor}
    });
  }

  function renderSmoke() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    if(Math.random() > 0.5) spawnParticle();
    
    for(let i=particles.length-1; i>=0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.r += 0.5; // expand
      p.life -= 0.005;
      
      if(p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.c.r}, ${p.c.g}, ${p.c.b}, ${p.life * 0.5})`;
      ctx.fill();
    }
    
    requestAnimationFrame(renderSmoke);
  }
  renderSmoke();


  // Audio System
  let audioCtx;
  let isMuted = false;
  let audioInit = false;
  let masterGain, bubbleGain;

  async function initAudio() {
    if (audioInit) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);

    // Bubbling Noise
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      // Sparse spikes in noise for bubble pops
      data[i] = Math.random() > 0.99 ? (Math.random()*2-1) : 0;
    }
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;
    
    // Filter to make it sound underwater/thick
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 400;
    filter.Q.value = 5;
    
    bubbleGain = audioCtx.createGain();
    bubbleGain.gain.value = isMuted ? 0 : 0.8;
    
    noise.connect(filter);
    filter.connect(bubbleGain);
    bubbleGain.connect(masterGain);
    noise.start();
    
    audioInit = true;
  }

  function toggleMute() {
    if (!audioInit) initAudio();
    isMuted = !isMuted;
    if (bubbleGain) bubbleGain.gain.setTargetAtTime(isMuted ? 0 : 0.8, audioCtx.currentTime, 0.1);
    document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🕯️';
  }

  function playPlop() {
    if (!audioInit || isMuted) return;
    const t = audioCtx.currentTime;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    
    // Pitch envelope (high to low quickly)
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.1);
    
    // Amp envelope
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.5, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.2);
  }

  function playBoom() {
    if (!audioInit || isMuted) return;
    const t = audioCtx.currentTime;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    
    osc.frequency.setValueAtTime(100, t);
    osc.frequency.exponentialRampToValueAtTime(20, t + 1);
    
    gain.gain.setValueAtTime(0.8, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 2);
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, t);
    filter.frequency.exponentialRampToValueAtTime(100, t + 1);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    
    osc.start(t);
    osc.stop(t + 2);
  }

  document.body.addEventListener('click', () => {
    if(!audioInit && !isMuted) initAudio();
  }, {once:true});

</script>
</body>
</html>
