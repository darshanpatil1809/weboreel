<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>quantum_portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,400;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #fff;
    --bg-grad: linear-gradient(135deg, #050508 0%, #0a0a10 100%);
    --glass-color: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.1);
    --font: 'Space Mono', monospace;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg-grad);
    color: #fff;
    font-family: var(--font);
    overflow-x: hidden;
    min-height: 100vh;
    transition: background 0.6s, font-family 0.6s;
  }

  /* Typography styles based on state */
  body.state-developer { font-family: 'Space Mono', monospace; }
  body.state-designer { font-family: 'Playfair Display', serif; }
  body.state-dreamer { font-family: 'Cormorant Garamond', serif; }

  /* Canvas */
  #particle-canvas {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
  }
  #glow-container {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
  }
  .glow-orb {
    position: absolute; border-radius: 50%; filter: blur(80px);
    width: 400px; height: 400px; transition: background 0.6s;
  }

  /* Glassmorphism */
  .glass {
    background: var(--glass-color);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid var(--border);
    transition: background 0.6s, border 0.6s, box-shadow 0.6s;
  }

  /* Wave Collapse Animation Overlay */
  #ripple-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: var(--accent); z-index: 9999;
    clip-path: circle(0% at 50% 50%);
    pointer-events: none;
  }
  @keyframes ripple {
    0% { clip-path: circle(0% at var(--cx) var(--cy)); opacity: 1; }
    50% { opacity: 0.5; }
    100% { clip-path: circle(150% at var(--cx) var(--cy)); opacity: 0; }
  }

  /* Top Indicator */
  #state-indicator {
    position: fixed; top: 20px; left: 20px; z-index: 100;
    font-family: 'Space Mono', monospace; font-size: 0.8rem;
    display: none; /* Shows after first collapse */
    flex-direction: column; gap: 10px;
  }
  .indicator-title { opacity: 0.7; }
  .state-pills { display: flex; gap: 10px; }
  .state-pill {
    width: 15px; height: 15px; border-radius: 50%; cursor: pointer;
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5);
    transition: 0.3s;
  }
  .state-pill:hover, .state-pill.active { transform: scale(1.5); }
  .state-pill[data-state="developer"] { background: #00ff88; }
  .state-pill[data-state="designer"] { background: #ff6b9d; }
  .state-pill[data-state="dreamer"] { background: #d4a843; }

  #mute-btn {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: none; border: none; font-size: 1.5rem; cursor: pointer;
    filter: grayscale(100%); transition: 0.3s;
  }
  #mute-btn:hover { filter: grayscale(0%); }

  /* Hero / Selector (Initial State) */
  #hero-selector {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 50; transition: opacity 0.6s;
  }
  .orb-container {
    display: flex; gap: 5vw; margin-bottom: 40px; position: relative;
    width: 60vw; height: 200px; justify-content: center; align-items: center;
  }
  .q-orb {
    width: 120px; height: 120px; border-radius: 50%; cursor: pointer;
    display: flex; justify-content: center; align-items: center;
    color: #fff; font-family: 'Space Mono', monospace; font-size: 0.8rem; letter-spacing: 1px;
    background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.4s; position: absolute;
  }
  .q-orb.dev { background: rgba(0,255,136,0.1); border-color: rgba(0,255,136,0.4); box-shadow: 0 0 20px rgba(0,255,136,0.2); left: 10%; }
  .q-orb.des { background: rgba(255,107,157,0.1); border-color: rgba(255,107,157,0.4); box-shadow: 0 0 20px rgba(255,107,157,0.2); left: 50%; transform: translateX(-50%); }
  .q-orb.dre { background: rgba(212,168,67,0.1); border-color: rgba(212,168,67,0.4); box-shadow: 0 0 20px rgba(212,168,67,0.2); right: 10%; }
  .q-orb:hover { transform: scale(1.1) !important; z-index: 10; }
  .q-orb.dev:hover { box-shadow: 0 0 40px rgba(0,255,136,0.5); }
  .q-orb.des:hover { box-shadow: 0 0 40px rgba(255,107,157,0.5); transform: translateX(-50%) scale(1.1) !important; }
  .q-orb.dre:hover { box-shadow: 0 0 40px rgba(212,168,67,0.5); }
  .instruction { font-family: 'Space Mono'; font-size: 0.8rem; opacity: 0.6; }

  /* Main Content Area */
  #main-content {
    display: none; padding: 100px 10vw; position: relative; z-index: 10;
    max-width: 1200px; margin: 0 auto;
    animation: fadeIn 1s;
  }
  @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

  /* Morphing Content Styles */
  .section { margin-bottom: 10vh; }
  
  .name-display { transition: all 0.6s; margin-bottom: 10px; }
  .role-display { margin-bottom: 30px; opacity: 0.8; transition: all 0.6s; }
  .bio-display { line-height: 1.6; max-width: 800px; transition: all 0.6s; }
  
  .skills-container { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 30px; }
  .skill-tag { padding: 8px 16px; border-radius: 4px; transition: all 0.6s; }
  
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
  .project-card { padding: 30px; border-radius: 12px; transition: all 0.6s; min-height: 250px; display: flex; flex-direction: column;}
  .p-title { font-size: 1.5rem; margin-bottom: 15px; transition: 0.6s; }
  .p-desc { flex: 1; opacity: 0.8; transition: 0.6s; }
  
  /* State-specific Overrides */
  /* DEVELOPER */
  .state-developer .name-display { font-size: 3rem; color: var(--accent); font-weight: bold; }
  .state-developer .role-display { font-size: 1.2rem; }
  .state-developer .role-display::before { content: '> '; color: var(--accent); }
  .state-developer .bio-display { padding: 20px; border-left: 2px solid var(--accent); background: rgba(0,0,0,0.3); }
  .state-developer .skill-tag { border-radius: 2px; font-family: 'Space Mono'; border-left: 2px solid var(--accent); }
  .state-developer .project-card { border-radius: 4px; border-top: 3px solid var(--accent); }
  .state-developer .p-title::before { content: './'; color: var(--accent); }

  /* DESIGNER */
  .state-designer .name-display { font-size: 5rem; font-style: italic; letter-spacing: 2px; font-weight: normal; }
  .state-designer .role-display { font-size: 1.5rem; letter-spacing: 4px; text-transform: uppercase; font-family: 'Space Mono'; font-size: 0.8rem; }
  .state-designer .bio-display { font-size: 1.2rem; column-count: 2; column-gap: 40px; text-align: justify; }
  .state-designer .skill-tag { border-radius: 30px; font-family: 'Space Mono'; font-size: 0.8rem; letter-spacing: 1px; border: 1px solid var(--accent); }
  .state-designer .project-card { border-radius: 0; padding: 0; border: none; }
  .state-designer .p-title { font-style: italic; font-size: 2rem; padding: 20px 20px 0 20px; }
  .state-designer .p-desc { padding: 0 20px 20px 20px; }
  .state-designer .project-preview { width: 100%; height: 150px; background: linear-gradient(45deg, rgba(255,255,255,0.1), transparent); border-bottom: 1px solid var(--border); }

  /* DREAMER */
  .state-dreamer .name-display { font-size: 4rem; font-style: italic; color: var(--accent); }
  .state-dreamer .role-display { font-size: 1.5rem; font-style: italic; }
  .state-dreamer .bio-display { font-size: 1.4rem; text-align: center; max-width: 600px; margin: 0 auto; }
  .state-dreamer .skills-container { justify-content: center; }
  .state-dreamer .skill-tag { background: none !important; border: none !important; position: relative; padding: 10px 20px; font-style: italic; font-size: 1.2rem; }
  .state-dreamer .skill-tag::after { content:''; position:absolute; bottom:5px; left:50%; width:20px; height:1px; background:var(--accent); transform:translateX(-50%); }
  .state-dreamer .project-card { border-radius: 50% 50% 0 0; text-align: center; padding-top: 50px; border-color: rgba(212,168,67,0.3); }
  .state-dreamer .p-title { font-style: italic; color: var(--accent); }

  @media(max-width: 768px) {
    .orb-container { flex-direction: column; height: 60vh; gap: 20px; }
    .q-orb { position: relative !important; left: auto !important; right: auto !important; transform: none !important; }
    .state-designer .bio-display { column-count: 1; }
    #main-content { padding: 80px 5vw; }
  }

</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div id="glow-container">
  <div class="glow-orb" style="top: -100px; left: -100px;"></div>
  <div class="glow-orb" style="bottom: -100px; right: -100px;"></div>
  <div class="glow-orb" style="top: 40%; left: 40%;"></div>
</div>

<div id="ripple-overlay"></div>

<button id="mute-btn">⚛️</button>

<div id="state-indicator" class="glass" style="padding: 10px; border-radius: 10px;">
  <div class="indicator-title">STATE: <span id="current-state-lbl">SUPERPOSITION</span></div>
  <div style="font-size: 0.6rem; opacity:0.5;">SWITCH:</div>
  <div class="state-pills">
    <div class="state-pill" data-state="developer" title="Developer"></div>
    <div class="state-pill" data-state="designer" title="Designer"></div>
    <div class="state-pill" data-state="dreamer" title="Dreamer"></div>
  </div>
</div>

<div id="hero-selector">
  <div class="orb-container">
    <div class="q-orb dev" data-state="developer">DEVELOPER</div>
    <div class="q-orb des" data-state="designer">DESIGNER</div>
    <div class="q-orb dre" data-state="dreamer">DREAMER</div>
  </div>
  <div class="instruction">Observe to collapse.</div>
</div>

<div id="main-content">
  <div class="section hero-section">
    <div class="name-display" id="c-name">DARSHAN PATIL</div>
    <div class="role-display" id="c-role"></div>
    <div class="bio-display glass" id="c-bio"></div>
    <div class="skills-container" id="c-skills">
      <!-- Injected -->
    </div>
  </div>

  <div class="section projects-section">
    <h3 style="margin-bottom:20px; font-size:1.5rem; opacity:0.7;" class="section-heading" id="c-proj-heading">PROJECTS</h3>
    <div class="projects-grid" id="c-projects">
      <!-- Injected -->
    </div>
  </div>

  <div class="section contact-section">
    <div class="glass" id="c-contact" style="padding: 40px; text-align: center;">
      <!-- Injected -->
    </div>
  </div>
</div>

<script>
  const states = {
    developer: {
      accent: '#00ff88',
      bgGrad: 'linear-gradient(135deg, #020810 0%, #050a20 100%)',
      glassColor: 'rgba(0, 255, 136, 0.03)',
      border: 'rgba(0, 255, 136, 0.15)',
      role: 'FULL STACK DEVELOPER',
      bio: '$ whoami\n> Darshan Patil\n$ ls skills/\n> React/ Node.js/ Python/ Three.js/\n$ cat bio.txt\n> Building things on the internet. Focused on robust architecture and scalable systems.',
      projHeading: 'ls -l ./projects',
      projects: [
        { title: 'SYSTEM.exe', desc: 'A high-performance distributed caching layer written in Go.' },
        { title: 'API_GATEWAY', desc: 'GraphQL federation service handling 10M+ requests daily.' },
        { title: 'TERMINAL_UI', desc: 'React component library built for command-line aesthetics.' }
      ],
      skills: ['TypeScript', 'Go', 'Docker', 'PostgreSQL', 'Redis', 'AWS'],
      contact: '> ./contact.sh\n> initiating connection...'
    },
    designer: {
      accent: '#ff6b9d',
      bgGrad: 'linear-gradient(135deg, #0a0510 0%, #1a0520 100%)',
      glassColor: 'rgba(255, 107, 157, 0.04)',
      border: 'rgba(255, 107, 157, 0.15)',
      role: 'Visual Designer · Creative Director',
      bio: 'Design is not just what it looks like and feels like. Design is how it works. I craft digital experiences that sit at the intersection of aesthetic beauty and functional clarity. Every pixel serves a purpose. Every interaction tells a story.',
      projHeading: 'Selected Works',
      projects: [
        { title: 'F.01 Ethereal', desc: 'Brand identity and digital presence for a luxury fashion house.' },
        { title: 'F.02 Kinetic', desc: 'Motion design system for a global fintech application.' },
        { title: 'F.03 Void', desc: 'An experimental typography exploration in web space.' }
      ],
      skills: ['Art Direction', 'UI/UX', 'Motion', 'Typography', 'Figma', 'Cinema4D'],
      contact: 'Let us create something beautiful together.'
    },
    dreamer: {
      accent: '#d4a843',
      bgGrad: 'linear-gradient(135deg, #080510 0%, #150a20 100%)',
      glassColor: 'rgba(212, 168, 67, 0.03)',
      border: 'rgba(212, 168, 67, 0.15)',
      role: 'Builder of things that exist on the edge of possible',
      bio: 'I build bridges between what is and what could be. The internet is a canvas, and code is just the brush. I am interested in building tools that expand human capability and art that touches the soul.',
      projHeading: 'Dreams Made Real',
      projects: [
        { title: 'The Memory Machine', desc: '"It helped people remember who they used to be."' },
        { title: 'Echoes', desc: '"We captured the sound of a falling leaf and turned it into an interface."' },
        { title: 'Starlight', desc: '"A visualization of human connection across distances."' }
      ],
      skills: ['Imagination', 'Empathy', 'Storytelling', 'Philosophy', 'Code', 'Art'],
      contact: 'Where do we go from here?'
    }
  };

  let currentState = null;
  const overlay = document.getElementById('ripple-overlay');
  const heroSelector = document.getElementById('hero-selector');
  const mainContent = document.getElementById('main-content');
  const indicator = document.getElementById('state-indicator');
  const stateLbl = document.getElementById('current-state-lbl');
  const pills = document.querySelectorAll('.state-pill');

  // DOM Elements to morph
  const elRole = document.getElementById('c-role');
  const elBio = document.getElementById('c-bio');
  const elSkills = document.getElementById('c-skills');
  const elProjHeading = document.getElementById('c-proj-heading');
  const elProjects = document.getElementById('c-projects');
  const elContact = document.getElementById('c-contact');

  // Triggers
  document.querySelectorAll('.q-orb').forEach(orb => {
    orb.addEventListener('click', (e) => {
      const state = orb.getAttribute('data-state');
      triggerCollapse(state, e.clientX, e.clientY);
    });
  });

  pills.forEach(pill => {
    pill.addEventListener('click', (e) => {
      const state = pill.getAttribute('data-state');
      if(state !== currentState) {
        triggerCollapse(state, e.clientX, e.clientY);
      }
    });
  });

  function triggerCollapse(stateKey, x, y) {
    const data = states[stateKey];
    
    // Play sound
    playCollapseSound(stateKey);

    // Animation overlay
    overlay.style.setProperty('--cx', `${x}px`);
    overlay.style.setProperty('--cy', `${y}px`);
    overlay.style.background = data.accent;
    overlay.style.animation = 'none';
    void overlay.offsetWidth; // trigger reflow
    overlay.style.animation = 'ripple 0.8s cubic-bezier(0.16, 1, 0.3, 1)';

    setTimeout(() => {
      applyState(stateKey);
      if(heroSelector.style.display !== 'none') {
        heroSelector.style.display = 'none';
        mainContent.style.display = 'block';
        indicator.style.display = 'flex';
      }
    }, 400); // apply at peak of ripple
  }

  function applyState(stateKey) {
    currentState = stateKey;
    const data = states[stateKey];

    // CSS Vars
    document.documentElement.style.setProperty('--accent', data.accent);
    document.documentElement.style.setProperty('--bg-grad', data.bgGrad);
    document.documentElement.style.setProperty('--glass-color', data.glassColor);
    document.documentElement.style.setProperty('--border', data.border);

    // Body class
    document.body.className = `state-${stateKey}`;

    // Indicator
    stateLbl.innerText = stateKey.toUpperCase();
    pills.forEach(p => p.classList.toggle('active', p.getAttribute('data-state') === stateKey));

    // Glow Orbs
    document.querySelectorAll('.glow-orb').forEach(orb => {
      orb.style.background = `radial-gradient(circle, ${data.accent}44, transparent 70%)`;
    });

    // Content Morphing
    elRole.innerText = data.role;
    elProjHeading.innerText = data.projHeading;
    elContact.innerText = data.contact;

    if(stateKey === 'developer') {
      elBio.innerHTML = data.bio.replace(/\n/g, '<br>');
    } else if (stateKey === 'dreamer') {
      // Typewriter effect for bio
      elBio.innerText = '';
      let i = 0;
      const typeTxt = data.bio;
      function type() {
        if(i < typeTxt.length) {
          elBio.innerHTML += typeTxt.charAt(i);
          i++;
          setTimeout(type, 20);
        }
      }
      type();
    } else {
      elBio.innerText = data.bio;
    }

    // Skills
    elSkills.innerHTML = data.skills.map(s => `<div class="skill-tag glass">${s}</div>`).join('');

    // Projects
    elProjects.innerHTML = data.projects.map(p => {
      let extra = '';
      if(stateKey === 'designer') extra = '<div class="project-preview"></div>';
      return `
        <div class="project-card glass">
          ${extra}
          <div class="p-title">${p.title}</div>
          <div class="p-desc">${p.desc}</div>
        </div>
      `;
    }).join('');
  }

  // --- Particle Canvas ---
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for(let i=0; i<80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random()-0.5),
      vy: (Math.random()-0.5),
      baseX: Math.random() * canvas.width,
      baseY: Math.random() * canvas.height,
      size: Math.random() * 2 + 1
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = currentState ? states[currentState].accent : '#ffffff';
    
    particles.forEach((p, i) => {
      if(!currentState) {
        // Orbit center
        const cx = canvas.width/2; const cy = canvas.height/2;
        const dist = Math.sqrt((p.x-cx)**2 + (p.y-cy)**2);
        const angle = Math.atan2(p.y-cy, p.x-cx) + 0.005;
        p.x = cx + Math.cos(angle) * dist;
        p.y = cy + Math.sin(angle) * dist;
      } else if (currentState === 'developer') {
        // Grid snap behavior
        p.x += (p.baseX - p.x) * 0.05;
        p.y += (p.baseY - p.y) * 0.05;
        // Jitter
        if(Math.random()<0.01) p.baseX = Math.floor(Math.random()*20)*(canvas.width/20);
        if(Math.random()<0.01) p.baseY = Math.floor(Math.random()*20)*(canvas.height/20);
      } else if (currentState === 'designer') {
        // Fluid sine wave
        p.x += p.vx * 2;
        p.y += Math.sin(p.x * 0.01) * 2;
        if(p.x > canvas.width) p.x = 0;
        if(p.x < 0) p.x = canvas.width;
      } else if (currentState === 'dreamer') {
        // Slow random float
        p.x += p.vx * 0.5;
        p.y += p.vy * 0.5;
        if(p.x > canvas.width) p.x = 0;
        if(p.y > canvas.height) p.y = 0;
        if(p.x < 0) p.x = canvas.width;
        if(p.y < 0) p.y = canvas.height;
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.globalAlpha = 0.5;
      ctx.fill();
    });

    // Draw lines if developer
    if(currentState === 'developer') {
      ctx.strokeStyle = states[currentState].accent;
      ctx.globalAlpha = 0.1;
      ctx.beginPath();
      for(let i=0; i<particles.length; i+=3) {
        if(particles[i+1]) {
          const dist = Math.hypot(particles[i].x - particles[i+1].x, particles[i].y - particles[i+1].y);
          if(dist < 200) {
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[i+1].x, particles[i+1].y);
          }
        }
      }
      ctx.stroke();
    }

    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // --- Orb initial animation ---
  const orbs = document.querySelectorAll('.q-orb');
  let angle = 0;
  function orbitOrbs() {
    if(currentState) return; // stop when collapsed
    angle += 0.01;
    orbs[0].style.transform = `translate(${Math.cos(angle)*50}px, ${Math.sin(angle)*50}px)`;
    orbs[2].style.transform = `translate(${Math.cos(angle + Math.PI)*50}px, ${Math.sin(angle + Math.PI)*50}px)`;
    requestAnimationFrame(orbitOrbs);
  }
  orbitOrbs();

  // --- Web Audio API ---
  let audioCtx, masterGain, isMuted = true, audioInit = false;
  let activeNodes = [];

  document.getElementById('mute-btn').addEventListener('click', (e) => {
    if(!audioInit) initAudio();
    isMuted = !isMuted;
    e.target.style.filter = isMuted ? 'grayscale(100%)' : 'grayscale(0%)';
    if(masterGain) {
      masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.05, audioCtx.currentTime, 0.5);
    }
  });

  function initAudio() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);
    audioInit = true;
    if(currentState) playStateMusic(currentState);
  }

  function playCollapseSound(stateKey) {
    if(!audioInit || isMuted) return;
    
    // Noise burst
    const bufferSize = audioCtx.sampleRate;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.setValueAtTime(2000, audioCtx.currentTime);
    noiseFilter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
    
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    
    noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterGain);
    noise.start(); noise.stop(audioCtx.currentTime + 0.5);

    // Switch music
    setTimeout(() => playStateMusic(stateKey), 500);
  }

  let beatInterval;
  function playStateMusic(stateKey) {
    if(!audioInit || isMuted) return;
    
    // Fade old
    activeNodes.forEach(n => {
      n.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
      setTimeout(() => { try{n.osc.stop();}catch(e){} n.gain.disconnect(); }, 1000);
    });
    activeNodes = [];
    if(beatInterval) clearInterval(beatInterval);

    if(stateKey === 'developer') {
      // 130bpm electronic beat
      beatInterval = setInterval(() => {
        if(isMuted) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
      }, (60/130)*1000);
      
      const osc = audioCtx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = 55;
      const g = audioCtx.createGain();
      g.gain.value = 0.02;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 200;
      osc.connect(filter); filter.connect(g); g.connect(masterGain);
      osc.start();
      activeNodes.push({osc, gain:g});

    } else if (stateKey === 'designer') {
      // Warm pads
      [261.63, 329.63, 392.00].forEach(f => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 2);
        osc.connect(g); g.connect(masterGain);
        osc.start();
        activeNodes.push({osc, gain:g});
      });
    } else if (stateKey === 'dreamer') {
      // Ambient crystal
      [880.00, 1046.50].forEach(f => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 3);
        
        // Tremolo effect
        const lfo = audioCtx.createOscillator();
        lfo.frequency.value = 0.5;
        const lfoGain = audioCtx.createGain();
        lfoGain.gain.value = 0.01;
        lfo.connect(lfoGain); lfoGain.connect(g.gain);
        lfo.start();
        
        osc.connect(g); g.connect(masterGain);
        osc.start();
        activeNodes.push({osc, gain:g, lfo});
      });
    }
  }

</script>
