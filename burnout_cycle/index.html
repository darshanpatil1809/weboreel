<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>burnout_cycle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap');
body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Oswald', sans-serif; overflow: hidden; }
.wheel { position: absolute; top: 50%; left: 50%; width: 100vmax; height: 100vmax; margin-left: -50vmax; margin-top: -50vmax; border-radius: 50%; transform-origin: center center; will-change: transform; }
.text-node { position: absolute; top: 50%; left: 50%; transform-origin: 0 0; font-size: 4rem; text-transform: uppercase; white-space: nowrap; color: rgba(255,255,255,0.2); transition: color 0.3s, transform 0.1s; }
.text-node.active { color: #ff3333; text-shadow: 0 0 20px #ff3333; transform: scale(1.2); }
#mute-btn { position: fixed; top: 20px; right: 20px; z-index: 10; background: transparent; border: 1px solid #fff; color: #fff; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
.vignette { position: fixed; top:0; left:0; width:100%; height:100%; box-shadow: inset 0 0 150px rgba(0,0,0,1); pointer-events: none; z-index: 5; }
</style>
</head>
<body>
<button id="mute-btn">❤️</button>
<div class="wheel" id="wheel"></div>
<div class="vignette" id="vig"></div>
<script>
const phrases = ["Motivation", "Grind", "Just one more hour", "Coffee", "Skip sleep", "Blurry vision", "Deadline", "Panic", "Exhaustion", "Burnout", "Numbness", "Recovery"];
const wheel = document.getElementById('wheel');
const radius = window.innerWidth < 768 ? 150 : 300;

phrases.forEach((p, i) => {
  let angle = (i / phrases.length) * Math.PI * 2;
  let div = document.createElement('div');
  div.className = 'text-node';
  div.innerText = p;
  div.style.transform = `rotate(${angle}rad) translate(${radius}px, 0)`;
  div.id = `node${i}`;
  wheel.appendChild(div);
});

let currentAngle = 0, targetAngle = 0;
window.addEventListener('wheel', e => { targetAngle += e.deltaY * 0.005; });
let touchStart = 0;
window.addEventListener('touchstart', e => touchStart = e.touches[0].clientY);
window.addEventListener('touchmove', e => { targetAngle += (touchStart - e.touches[0].clientY) * 0.01; touchStart = e.touches[0].clientY; });

let actx, master, osc;
let isMuted = true;
let bpm = 60;
let lastBeat = 0;

document.getElementById('mute-btn').onclick = () => {
  if(!actx) {
    actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination);
    requestAnimationFrame(audioLoop);
  }
  isMuted = !isMuted;
};

function audioLoop() {
  if(!isMuted && actx) {
    let now = actx.currentTime;
    if(now - lastBeat > 60/bpm) {
      playHeartbeat();
      lastBeat = now;
    }
  }
  requestAnimationFrame(audioLoop);
}

function playHeartbeat() {
  let o = actx.createOscillator(); let g = actx.createGain();
  o.frequency.setValueAtTime(50, actx.currentTime); o.frequency.exponentialRampToValueAtTime(30, actx.currentTime + 0.1);
  g.gain.setValueAtTime(0.8, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3);
  o.connect(g).connect(master); o.start(); o.stop(actx.currentTime + 0.3);
}

function tick() {
  currentAngle += (targetAngle - currentAngle) * 0.1;
  wheel.style.transform = `rotate(${-currentAngle}rad)`;
  
  // Normalize angle to find active node
  let normalized = ((currentAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  let idx = Math.round((normalized / (Math.PI*2)) * phrases.length) % phrases.length;
  
  phrases.forEach((_, i) => {
    let n = document.getElementById(`node${i}`);
    if(i === idx) n.classList.add('active');
    else n.classList.remove('active');
  });

  // BPM logic based on speed
  let speed = Math.abs(targetAngle - currentAngle);
  bpm = 60 + speed * 1000;
  if(bpm > 180) bpm = 180;
  
  // Red vignette on high speed
  document.getElementById('vig').style.boxShadow = `inset 0 0 ${150 + speed*500}px rgba(${speed*1000},0,0,1)`;

  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
