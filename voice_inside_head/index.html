<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>voice_inside_head</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
body, html { margin: 0; padding: 0; background: #050505; color: #ccc; font-family: 'Special Elite', cursive; overflow-x: hidden; height: 1000vh; }
.container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.line { font-size: 3vw; margin: 20px; opacity: 0; transition: opacity 0.5s, transform 0.5s, filter 2s; transform: translateY(20px); filter: blur(10px); }
.line.visible { opacity: 1; transform: translateY(0); filter: blur(0px); }
#mute-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; border: 1px solid #555; background: transparent; color: #555; padding: 10px; cursor: pointer; pointer-events: auto; }
</style>
</head>
<body>
<button id="mute-btn">Audio</button>
<div class="container" id="cont">
  <div class="line" id="l0">Can you hear me?</div>
  <div class="line" id="l1">I know you're trying to sleep.</div>
  <div class="line" id="l2">But we need to talk about what happened.</div>
  <div class="line" id="l3">You think they forgot?</div>
  <div class="line" id="l4">They didn't forget.</div>
</div>
<script>
let actx, master, noise;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { 
    actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.5; master.connect(actx.destination); 
  }
  isMuted = !isMuted;
};

function playWhisper() {
  if(!actx || isMuted) return;
  // Create bandpass noise for a breathy whisper
  let bufSize = actx.sampleRate;
  let buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  let data = buf.getChannelData(0);
  for(let i=0; i<bufSize; i++) data[i] = Math.random() * 2 - 1;
  let n = actx.createBufferSource(); n.buffer = buf;
  let f = actx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2000; f.Q.value = 1.0;
  let g = actx.createGain();
  n.connect(f).connect(g).connect(master);
  
  g.gain.setValueAtTime(0, actx.currentTime);
  g.gain.linearRampToValueAtTime(0.5, actx.currentTime + 0.2);
  g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 1.0);
  
  n.start(); n.stop(actx.currentTime + 1.0);
}

let lastIdx = -1;
window.addEventListener('scroll', () => {
  let progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  let idx = Math.min(4, Math.floor(progress * 6));
  
  if(idx > lastIdx && idx <= 4) {
    document.getElementById('l'+idx).classList.add('visible');
    playWhisper();
    lastIdx = idx;
  }
});
</script>
</body>
</html>
