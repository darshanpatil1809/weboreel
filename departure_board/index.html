<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>departure_board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #111;
    --board-bg: #1a1a1a;
    --text: #ffaa00;
    --dim: #555;
    --flap-bg: #222;
  }

  body, html {
    margin: 0; padding: 0; height: 100vh; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace;
  }

  #mute-btn {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: transparent; border: 1px solid var(--dim); color: var(--text);
    font-size: 20px; cursor: pointer; padding: 10px; border-radius: 5px;
  }

  /* Split-flap Board */
  .board-container {
    width: 95vw; max-width: 1000px; margin: 10vh auto;
    background: var(--board-bg); padding: 2rem; border-radius: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
    border: 2px solid #333;
  }

  .header-row {
    display: grid; grid-template-columns: 1fr 2fr 1fr 1fr;
    color: var(--dim); font-weight: bold; margin-bottom: 1rem;
    padding-bottom: 0.5rem; border-bottom: 2px solid #333;
    font-size: 0.9rem; text-transform: uppercase;
  }

  .row {
    display: grid; grid-template-columns: 1fr 2fr 1fr 1fr;
    margin-bottom: 10px; gap: 10px; align-items: center;
  }

  /* The actual flap character */
  .word-flap { display: flex; gap: 2px; }
  
  .char {
    width: 25px; height: 35px; background: var(--flap-bg);
    border: 1px solid #111; border-radius: 2px;
    display: flex; justify-content: center; align-items: center;
    font-size: 1.2rem; position: relative; font-weight: bold;
    box-shadow: 0 2px 2px rgba(0,0,0,0.5);
  }
  .char::after {
    content:''; position:absolute; top:50%; left:0; width:100%; height:1px;
    background: rgba(0,0,0,0.8); z-index: 2;
  }
  
  .status-delayed { color: #ff3333; }
  .status-boarding { color: #33ff33; }

  /* Narrative text below board */
  .narrative {
    position: fixed; bottom: 10vh; left: 50%; transform: translateX(-50%);
    width: 80vw; max-width: 600px; text-align: center;
    font-family: 'DM Sans', sans-serif; font-size: 1.2rem; color: #ccc;
    opacity: 0; transition: opacity 1s; font-style: italic;
  }
  
  /* Scroll prompt */
  .scroll-prompt {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: var(--dim); font-size: 0.8rem; letter-spacing: 2px;
    animation: pulse 2s infinite; pointer-events: none;
  }
  @keyframes pulse { 0% {opacity:0.3;} 50% {opacity:1;} 100% {opacity:0.3;} }

  @media (max-width: 768px) {
    .board-container { padding: 1rem; overflow-x: auto; }
    .header-row, .row { min-width: 600px; } /* force scroll on mobile to keep layout */
    .narrative { font-size: 1rem; bottom: 5vh;}
  }
</style>
</head>
<body>

<button id="mute-btn">✈️</button>

<div class="board-container">
  <div class="header-row">
    <div>TIME</div>
    <div>DESTINATION</div>
    <div>FLIGHT</div>
    <div>STATUS</div>
  </div>
  <div id="board">
    <!-- Rows generated by JS -->
  </div>
</div>

<div class="narrative" id="narrative-text"></div>
<div class="scroll-prompt">SCROLL TO ADVANCE TIME</div>

<script>
  // Data Structure
  const rowsData = [
    { time: "18:45", dest: "LONDON LHR", flt: "BA198", status: "DEPARTED", class: "" },
    { time: "19:10", dest: "TOKYO NRT",  flt: "JL041", status: "BOARDING", class: "status-boarding" },
    { time: "19:30", dest: "NEW YORK",   flt: "UA842", status: "DELAYED",  class: "status-delayed" },
    { time: "20:00", dest: "PARIS CDG",  flt: "AF112", status: "ON TIME",  class: "" },
    { time: "20:15", dest: "HOME",       flt: "----",  status: "WAITING",  class: "" } // The narrative hook
  ];

  // Helper to create flap HTML for a string
  function createFlaps(str, length) {
    let html = '<div class="word-flap">';
    const padded = str.padEnd(length, ' ');
    for(let i=0; i<length; i++) {
      html += `<div class="char" data-target="${padded[i]}">${padded[i]}</div>`;
    }
    html += '</div>';
    return html;
  }

  // Initial render
  const boardEl = document.getElementById('board');
  function renderBoard() {
    let html = '';
    rowsData.forEach((row, i) => {
      html += `
        <div class="row" id="row-${i}">
          ${createFlaps(row.time, 5)}
          ${createFlaps(row.dest, 10)}
          ${createFlaps(row.flt, 5)}
          <div class="word-flap ${row.class}">${createFlaps(row.status, 8)}</div>
        </div>
      `;
    });
    boardEl.innerHTML = html;
  }
  renderBoard();

  // Story progression
  const storyStates = [
    {
      progress: 0,
      narrative: "",
      updates: []
    },
    {
      progress: 0.2,
      narrative: "You've been sitting at Gate 42 for three hours.",
      updates: [
        { r: 2, field: 'status', val: 'DELAYED ', class: 'status-delayed' }
      ]
    },
    {
      progress: 0.4,
      narrative: "Every time the board clicks, you hope it's your flight. Or you hope it's cancelled so you don't have to go.",
      updates: [
        { r: 1, field: 'status', val: 'DEPARTED', class: '' },
        { r: 3, field: 'status', val: 'BOARDING', class: 'status-boarding' }
      ]
    },
    {
      progress: 0.6,
      narrative: "They say airports are liminal spaces. Places between places. You decide you like it here. You don't have to be who you were, or who you're going to be.",
      updates: [
        { r: 2, field: 'time', val: '21:00' },
        { r: 3, field: 'status', val: 'DEPARTED', class: '' }
      ]
    },
    {
      progress: 0.8,
      narrative: "The overhead voice calls your name. Final boarding call.",
      updates: [
        { r: 4, field: 'status', val: 'BOARDING', class: 'status-boarding' }
      ]
    },
    {
      progress: 1.0,
      narrative: "You pick up your bag. The board clicks one last time.",
      updates: [
        { r: 4, field: 'status', val: 'MISSED  ', class: 'status-delayed' }
      ]
    }
  ];

  let currentState = 0;
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 :-';

  // Flap Animation Logic
  function animateFlaps(rowIdx, fieldIndex, newStr, newClass) {
    const rowEl = document.getElementById(`row-${rowIdx}`);
    // fields: 0=time, 1=dest, 2=flt, 3=status
    const targetWrapper = rowEl.children[fieldIndex]; 
    if(fieldIndex === 3 && newClass !== undefined) {
      targetWrapper.className = `word-flap ${newClass}`;
    }
    
    const charDivs = targetWrapper.querySelectorAll('.char');
    const paddedStr = newStr.padEnd(charDivs.length, ' ');
    
    charDivs.forEach((div, i) => {
      const targetChar = paddedStr[i];
      if(div.dataset.target === targetChar) return; // no change
      
      div.dataset.target = targetChar;
      
      // Simulate cycling through characters
      let flipCount = 0;
      const maxFlips = 10 + Math.floor(Math.random() * 10); // Random duration
      
      const flipInt = setInterval(() => {
        flipCount++;
        if(flipCount >= maxFlips) {
          clearInterval(flipInt);
          div.innerText = targetChar;
        } else {
          // pick random char while flipping
          div.innerText = chars[Math.floor(Math.random() * chars.length)];
        }
        playFlapSound();
      }, 50);
    });
  }

  // Scroll Tracking (virtual)
  let virtualScroll = 0;
  const maxScroll = 5000;

  window.addEventListener('wheel', e => {
    virtualScroll += e.deltaY;
    virtualScroll = Math.max(0, Math.min(virtualScroll, maxScroll));
    checkProgress();
  });
  
  let touchStartY = 0;
  window.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
  window.addEventListener('touchmove', e => {
    virtualScroll += (touchStartY - e.touches[0].clientY) * 3;
    touchStartY = e.touches[0].clientY;
    virtualScroll = Math.max(0, Math.min(virtualScroll, maxScroll));
    checkProgress();
  });

  // Audio System
  let audioCtx, masterGain;
  let isMuted = true;

  document.getElementById('mute-btn').addEventListener('click', () => {
    isMuted = !isMuted;
    document.getElementById('mute-btn').style.background = isMuted ? 'transparent' : 'var(--dim)';
    document.getElementById('mute-btn').style.color = isMuted ? 'var(--text)' : '#111';
    if(!audioCtx && !isMuted) initAudio();
    if(masterGain) masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.8, audioCtx.currentTime, 0.1);
    if(!isMuted && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  });

  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    masterGain.gain.value = 0.8;
    
    // Low airport hum
    const hum = audioCtx.createOscillator();
    const hGain = audioCtx.createGain();
    hum.type = 'sine'; hum.frequency.value = 60;
    hum.connect(hGain); hGain.connect(masterGain);
    hGain.gain.value = 0.1;
    hum.start();
  }

  // Track flap sounds to avoid audio overload
  let lastFlapTime = 0;
  function playFlapSound() {
    if(!audioCtx || isMuted) return;
    const now = audioCtx.currentTime;
    if(now - lastFlapTime < 0.02) return; // rate limit
    lastFlapTime = now;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.value = 200 + Math.random()*100;
    osc.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0.01, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    osc.start(now); osc.stop(now + 0.05);
  }

  const narrativeEl = document.getElementById('narrative-text');

  function checkProgress() {
    const progress = virtualScroll / maxScroll;
    
    // Find highest state we have passed
    let targetState = 0;
    for(let i=0; i<storyStates.length; i++) {
      if(progress >= storyStates[i].progress) {
        targetState = i;
      }
    }

    if(targetState !== currentState) {
      currentState = targetState;
      const stateData = storyStates[currentState];
      
      // Update narrative
      if(stateData.narrative) {
        narrativeEl.style.opacity = 0;
        setTimeout(() => {
          narrativeEl.innerText = stateData.narrative;
          narrativeEl.style.opacity = 1;
        }, 500);
      } else {
        narrativeEl.style.opacity = 0;
      }

      // Update board
      stateData.updates.forEach(u => {
        let fIdx = 0;
        if(u.field === 'dest') fIdx = 1;
        if(u.field === 'flt') fIdx = 2;
        if(u.field === 'status') fIdx = 3;
        animateFlaps(u.r, fIdx, u.val, u.class);
      });
    }
  }

</script>
</body>
</html>
