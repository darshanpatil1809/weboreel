<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-width=1.0">
<title>Babel Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #1a1512;
    --brass: #b5a642;
    --brass-dark: #7a6e27;
    --copper: #b87333;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body, html {
    background-color: var(--bg-dark);
    color: var(--brass);
    font-family: 'Special Elite', monospace;
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Boilerplate background texture */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      radial-gradient(circle at 50% 50%, rgba(181, 166, 66, 0.05) 0%, transparent 80%),
      repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.2) 10px, rgba(0,0,0,0.2) 20px);
    z-index: -2;
  }

  .machine-frame {
    display: flex;
    gap: 2rem;
    padding: 3rem;
    background: linear-gradient(135deg, #2a221e, #140d0a);
    border: 10px solid #000;
    border-image: linear-gradient(to right, var(--brass-dark), var(--brass), var(--brass-dark)) 1;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,0.9);
    position: relative;
    max-width: 1200px;
    width: 90vw;
  }

  /* Brass Pipes */
  .pipe {
    position: absolute;
    background: linear-gradient(90deg, var(--brass-dark) 0%, var(--brass) 50%, var(--brass-dark) 100%);
    box-shadow: 2px 5px 10px rgba(0,0,0,0.6);
    z-index: 10;
  }
  .pipe-top { top: -20px; left: 10%; width: 80%; height: 20px; border-radius: 10px; }
  .pipe-bottom { bottom: -20px; left: 10%; width: 80%; height: 20px; border-radius: 10px; }
  .pipe-left { top: 10%; left: -20px; width: 20px; height: 80%; border-radius: 10px; background: linear-gradient(0deg, var(--brass-dark) 0%, var(--brass) 50%, var(--brass-dark) 100%); }
  .pipe-right { top: 10%; right: -20px; width: 20px; height: 80%; border-radius: 10px; background: linear-gradient(0deg, var(--brass-dark) 0%, var(--brass) 50%, var(--brass-dark) 100%); }

  .panel {
    flex: 1;
    background: var(--glass);
    border: 2px solid var(--brass-dark);
    border-radius: 10px;
    padding: 2rem;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--copper);
    margin-bottom: 1rem;
    text-align: center;
    border-bottom: 1px solid var(--brass-dark);
    padding-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  /* Input Area */
  .input-area {
    background: rgba(0,0,0,0.3);
    border: none;
    color: #e0d8c8;
    font-family: 'Special Elite', monospace;
    font-size: 1.5rem;
    line-height: 1.6;
    padding: 1rem;
    flex: 1;
    resize: none;
    outline: none;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
  }

  .input-area::placeholder {
    color: rgba(224, 216, 200, 0.3);
  }

  /* Output Area */
  .output-area {
    background: rgba(0,0,0,0.5);
    flex: 1;
    padding: 1rem;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 10px;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
    overflow-y: auto;
  }

  /* The Glyph CSS Art */
  .glyph {
    display: inline-block;
    width: 40px; height: 40px;
    position: relative;
    margin: 2px;
  }
  
  .glyph svg {
    width: 100%; height: 100%;
    stroke: var(--brass);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 5px rgba(181, 166, 66, 0.5));
    transition: all 0.3s;
  }

  .space {
    width: 20px;
  }

  .audio-toggle {
    position: absolute;
    top: 2rem; right: 2rem;
    background: rgba(26, 21, 18, 0.8);
    border: 1px solid var(--brass);
    border-radius: 50%;
    width: 50px; height: 50px;
    color: var(--brass);
    cursor: pointer;
    font-size: 1.2rem;
    display: flex; justify-content: center; align-items: center;
    z-index: 100;
  }

  /* Steam Animation */
  .steam {
    position: absolute;
    bottom: -20px; left: 50%;
    width: 10px; height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    filter: blur(10px);
    pointer-events: none;
    z-index: 20;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    50% { opacity: 0.5; }
    100% { transform: translateY(-300px) scale(5); opacity: 0; }
  }

  @media (max-width: 800px) {
    .machine-frame {
      flex-direction: column;
      height: 90vh;
    }
  }

</style>
</head>
<body>

  <button class="audio-toggle" onclick="toggleMute()" id="mute-btn">⚙️</button>

  <div class="machine-frame">
    <div class="pipe pipe-top"></div>
    <div class="pipe pipe-bottom"></div>
    <div class="pipe pipe-left"></div>
    <div class="pipe pipe-right"></div>

    <div class="panel">
      <div class="panel-title">MUNDANE INPUT</div>
      <textarea class="input-area" id="input-text" placeholder="Type here..."></textarea>
    </div>

    <div class="panel">
      <div class="panel-title">ASTRAL OUTPUT</div>
      <div class="output-area" id="output-area"></div>
    </div>
  </div>

<script>
  // Procedural Glyph Generator based on character charCode
  function generateGlyph(char) {
    if (char === ' ' || char === '\n') {
      return `<div class="space"></div>`;
    }
    
    const code = char.toLowerCase().charCodeAt(0);
    // Use code to deterministically pick points for SVG lines
    // We'll draw 3 lines for a cool runic look
    
    // Normalize code to 0-25 for a-z roughly
    let n = (code - 97) % 26;
    if (n < 0) n = code % 26; // fallback for punctuation
    
    // Seeded random-ish function
    const rand = (seed) => {
      const x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    };

    let svgContent = '';
    
    // Base circle for vowels
    if ('aeiou'.includes(char.toLowerCase())) {
      svgContent += `<circle cx="20" cy="20" r="${10 + rand(n)*5}" />`;
    }

    // 3 lines
    for(let i=0; i<3; i++) {
      const x1 = 5 + rand(n + i*1)*30;
      const y1 = 5 + rand(n + i*2)*30;
      const x2 = 5 + rand(n + i*3)*30;
      const y2 = 5 + rand(n + i*4)*30;
      svgContent += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" />`;
    }
    
    // Add dot for punctuation
    if ('.!?'.includes(char)) {
      svgContent += `<circle cx="20" cy="35" r="2" fill="var(--brass)" />`;
    }

    return `<div class="glyph"><svg viewBox="0 0 40 40">${svgContent}</svg></div>`;
  }

  const input = document.getElementById('input-text');
  const output = document.getElementById('output-area');

  let lastLength = 0;

  input.addEventListener('input', () => {
    const text = input.value;
    
    // Play sounds
    if (text.length > lastLength) {
      if (text.endsWith('\n')) {
        playBell();
        createSteam();
      } else {
        playTypewriter();
      }
    }
    lastLength = text.length;

    // Render glyphs
    let html = '';
    for(let i=0; i<text.length; i++) {
      html += generateGlyph(text[i]);
    }
    output.innerHTML = html;
  });

  // Steam visual
  function createSteam() {
    for(let i=0; i<5; i++) {
      const s = document.createElement('div');
      s.className = 'steam';
      s.style.left = `${30 + Math.random()*40}%`;
      s.style.animation = `rise 2s ease-in forwards`;
      s.style.animationDelay = `${Math.random()*0.5}s`;
      document.querySelector('.machine-frame').appendChild(s);
      setTimeout(() => s.remove(), 2500);
    }
    playHiss();
  }

  // Audio System
  let audioCtx;
  let isMuted = false;
  let audioInit = false;
  let masterGain;

  async function initAudio() {
    if (audioInit) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
    audioInit = true;
  }

  function toggleMute() {
    if (!audioInit) initAudio();
    isMuted = !isMuted;
    masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime, 0.1);
    document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '⚙️';
  }

  function playTypewriter() {
    if (!audioInit || isMuted) return;
    const t = audioCtx.currentTime;
    
    // Click
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(600 + Math.random()*200, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.05);
    
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.05);

    // Clack (noise)
    const bufferSize = audioCtx.sampleRate * 0.05;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const nGain = audioCtx.createGain();
    nGain.gain.setValueAtTime(0.1, t);
    nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    noise.connect(nGain); nGain.connect(masterGain);
    noise.start(t);
  }

  function playBell() {
    if (!audioInit || isMuted) return;
    const t = audioCtx.currentTime;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, t); // Bell pitch
    
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5); // Long ring
    
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 1.5);
  }

  function playHiss() {
    if (!audioInit || isMuted) return;
    const t = audioCtx.currentTime;
    
    const bufferSize = audioCtx.sampleRate * 1;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 3000;
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start(t);
  }

  document.body.addEventListener('click', () => {
    if(!audioInit && !isMuted) initAudio();
  }, {once:true});

</script>
</body>
</html>
