<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>data_stream</title>
<style>
body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; }
canvas { display: block; }
#mute-btn { position: fixed; top: 20px; right: 20px; z-index: 100; border: 1px solid #0f0; background: #000; color: #0f0; padding: 10px; cursor: pointer; font-family: monospace; }
</style>
</head>
<body>
<button id="mute-btn">SYS_AUDIO</button>
<canvas id="canvas"></canvas>

<script>
let actx, master, osc;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { 
    actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.1; master.connect(actx.destination); 
    osc = actx.createOscillator(); osc.type = 'square'; osc.frequency.value = 50; osc.connect(master); osc.start();
  }
  isMuted = !isMuted;
  if(master) master.gain.setTargetAtTime(isMuted ? 0 : 0.1, actx.currentTime, 0.5);
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const streams = [];
for(let i=0; i<w/20; i++) {
  streams.push({ x: i*20, y: Math.random()*h, speed: Math.random()*5+2, chars: [] });
}

const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";

function loop() {
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0, 0, w, h);
  
  ctx.fillStyle = '#0f0';
  ctx.font = '15px monospace';
  
  let maxSpeed = 0;
  
  streams.forEach(s => {
    s.y += s.speed;
    if(s.y > h) { s.y = 0; s.speed = Math.random()*5+2; }
    
    let char = charset[Math.floor(Math.random()*charset.length)];
    ctx.fillText(char, s.x, s.y);
    
    // Brighter head
    ctx.fillStyle = '#fff';
    ctx.fillText(char, s.x, s.y + 15);
    ctx.fillStyle = '#0f0';
    
    if(s.speed > maxSpeed) maxSpeed = s.speed;
  });
  
  if(actx && !isMuted && Math.random() < 0.1) {
    osc.frequency.setValueAtTime(50 + Math.random()*500, actx.currentTime);
  }
  
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
