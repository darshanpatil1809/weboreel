<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cursor_story</title>
<style>
body, html { margin: 0; padding: 0; background: #fff; overflow: hidden; height: 100vh; cursor: none; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.narrative { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Georgia', serif; font-size: 2rem; color: #222; text-align: center; opacity: 0; transition: opacity 2s; pointer-events: none; }
#mute-btn { position: fixed; top: 20px; right: 20px; z-index: 100; border: none; background: transparent; cursor: pointer; pointer-events: auto; }
</style>
</head>
<body>
<button id="mute-btn">🎵</button>
<div class="narrative" id="txt">Where are you going?</div>
<canvas id="canvas"></canvas>

<script>
let actx, master, osc;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { 
    actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.2; master.connect(actx.destination); 
    osc = actx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 200; osc.connect(master); osc.start();
  }
  isMuted = !isMuted;
  if(master) master.gain.setTargetAtTime(isMuted ? 0 : 0.2, actx.currentTime, 0.5);
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

let trail = [];
let distance = 0;
let lastP = {x: w/2, y: h/2};
let speed = 0;

window.addEventListener('mousemove', (e) => {
  let dx = e.clientX - lastP.x;
  let dy = e.clientY - lastP.y;
  let dist = Math.hypot(dx, dy);
  distance += dist;
  speed = dist;
  lastP = {x: e.clientX, y: e.clientY};
  
  trail.push({x: e.clientX, y: e.clientY, life: 1});
  
  if(actx && !isMuted) {
    osc.frequency.setTargetAtTime(200 + speed * 5, actx.currentTime, 0.1);
  }
});

const story = [
  { d: 0, t: "Move to begin." },
  { d: 1000, t: "You're always running." },
  { d: 3000, t: "But the trail fades." },
  { d: 6000, t: "Nothing is permanent." },
  { d: 10000, t: "Stop." }
];

function loop() {
  ctx.clearRect(0, 0, w, h);
  
  // Update trail
  ctx.beginPath();
  for(let i=0; i<trail.length; i++) {
    let p = trail[i];
    p.life -= 0.01;
    if(p.life <= 0) { trail.splice(i, 1); i--; continue; }
    
    ctx.lineWidth = p.life * 5;
    ctx.strokeStyle = \`rgba(0,0,0,\${p.life})\`;
    if(i===0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  
  // Custom cursor point
  ctx.beginPath();
  ctx.arc(lastP.x, lastP.y, 4, 0, Math.PI*2);
  ctx.fillStyle = '#f00';
  ctx.fill();
  
  // Story progression
  let currentText = "";
  for(let i=story.length-1; i>=0; i--) {
    if(distance > story[i].d) { currentText = story[i].t; break; }
  }
  let txtEl = document.getElementById('txt');
  if(txtEl.innerText !== currentText) {
    txtEl.style.opacity = 0;
    setTimeout(() => { txtEl.innerText = currentText; txtEl.style.opacity = 1; }, 1000);
  } else if (txtEl.style.opacity === "0" && currentText !== "") {
    txtEl.style.opacity = 1;
  }
  
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
