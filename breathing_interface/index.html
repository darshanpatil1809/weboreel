<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>breathing_interface</title>
<style>
body, html { margin: 0; padding: 0; background: #e0f7fa; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Helvetica Neue', sans-serif; }
.breath-container { width: 300px; height: 300px; background: rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #00838f; box-shadow: 0 0 50px rgba(0, 131, 143, 0.2); transition: transform 4s ease-in-out, background 4s ease-in-out, box-shadow 4s ease-in-out; }
.inhale { transform: scale(1.5); background: rgba(255,255,255,0.8); box-shadow: 0 0 100px rgba(0, 131, 143, 0.5); }
.exhale { transform: scale(0.8); background: rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(0, 131, 143, 0.1); }
#mute-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; border: 1px solid #00838f; background: transparent; color: #00838f; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
</style>
</head>
<body>
<button id="mute-btn">Start Breathing</button>
<div class="breath-container exhale" id="bc">Inhale</div>

<script>
let actx, master, filter;
let isMuted = true;
document.getElementById('mute-btn').onclick = () => {
  if(!actx) { 
    actx = new AudioContext(); master = actx.createGain(); master.gain.value = 0.3; master.connect(actx.destination); 
    
    // Create pink noise for breath sound
    let bufSize = actx.sampleRate * 2;
    let buf = actx.createBuffer(1, bufSize, actx.sampleRate);
    let data = buf.getChannelData(0);
    for(let i=0; i<bufSize; i++) data[i] = Math.random() * 2 - 1;
    let noise = actx.createBufferSource(); noise.buffer = buf; noise.loop = true;
    
    filter = actx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 400;
    
    noise.connect(filter).connect(master); noise.start();
    
    startBreathing();
  }
  isMuted = !isMuted;
  if(master) master.gain.setTargetAtTime(isMuted ? 0 : 0.3, actx.currentTime, 0.5);
};

let state = 'exhale'; // will switch to inhale immediately
const bc = document.getElementById('bc');

function startBreathing() {
  setInterval(() => {
    if(state === 'exhale') {
      state = 'inhale';
      bc.className = 'breath-container inhale';
      bc.innerText = 'Inhale';
      if(actx && !isMuted) {
        filter.frequency.setTargetAtTime(1500, actx.currentTime, 2); // Sound opens up
      }
    } else {
      state = 'exhale';
      bc.className = 'breath-container exhale';
      bc.innerText = 'Exhale';
      if(actx && !isMuted) {
        filter.frequency.setTargetAtTime(400, actx.currentTime, 2); // Sound muffles
      }
    }
  }, 4000); // 4 second breathing cycle
}
</script>
</body>
</html>
