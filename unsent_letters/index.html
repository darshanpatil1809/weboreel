<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-width=1.0">
<title>Unsent Letters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Playfair+Display:ital@1&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-sky: #8ca3bc;
    --cloud-color: rgba(255, 255, 255, 0.4);
    --letter-bg: rgba(245, 240, 235, 0.85);
    --ink: #2c3e50;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body, html {
    background-color: var(--bg-sky);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Sky Background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, #7a93ac 0%, #a2b7ca 50%, #d5dfec 100%);
    z-index: -3;
  }

  /* Cloud Canvas */
  canvas#clouds {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: -2;
    pointer-events: none;
    filter: blur(20px);
  }

  /* Main Container */
  .container {
    position: relative;
    width: 100%;
    max-width: 600px;
    height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    transition: opacity 1s, transform 1s;
  }

  .container.released {
    opacity: 0;
    pointer-events: none;
  }

  .envelope-bg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 110%;
    height: 110%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    z-index: -1;
  }

  .letter-paper {
    background: var(--letter-bg);
    width: 100%;
    height: 100%;
    border-radius: 4px;
    box-shadow: 
      inset 0 0 50px rgba(0,0,0,0.05),
      0 10px 30px rgba(0,0,0,0.1);
    padding: 3rem;
    display: flex;
    flex-direction: column;
    position: relative;
    background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(0,0,0,0.05) 31px, rgba(0,0,0,0.05) 32px);
    background-attachment: local;
  }

  .letter-header {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: rgba(44, 62, 80, 0.5);
    margin-bottom: 2rem;
    text-align: center;
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    resize: none;
    outline: none;
    font-family: 'Caveat', cursive;
    font-size: 1.8rem;
    line-height: 32px; /* matches bg lines */
    color: var(--ink);
    padding-top: 5px;
  }

  textarea::placeholder {
    color: rgba(44, 62, 80, 0.3);
  }

  .btn-release {
    margin-top: 2rem;
    background: transparent;
    border: 1px solid rgba(44, 62, 80, 0.3);
    color: var(--ink);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.2rem;
    padding: 0.8rem 3rem;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.1em;
  }

  .btn-release:hover {
    background: rgba(44, 62, 80, 0.05);
    border-color: rgba(44, 62, 80, 0.8);
    transform: translateY(-2px);
  }

  /* Release Animation Elements */
  .bird-char {
    position: absolute;
    font-family: 'Caveat', cursive;
    font-size: 1.5rem;
    color: var(--ink);
    pointer-events: none;
    z-index: 20;
    transition: all 3s cubic-bezier(0.25, 1, 0.5, 1); /* Initial burst */
  }

  .bird-char.flying {
    animation: flap 0.4s infinite alternate ease-in-out, flyAway 8s forwards linear;
    color: rgba(44, 62, 80, 0.7); /* slightly faded */
  }

  @keyframes flap {
    0% { transform: scaleY(1); }
    100% { transform: scaleY(-0.5); }
  }

  @keyframes flyAway {
    0% { opacity: 1; }
    80% { opacity: 0.8; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
  }

  .audio-toggle {
    position: absolute;
    top: 2rem;
    right: 2rem;
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 40px; height: 40px;
    color: white;
    cursor: pointer;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }

  .farewell-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2rem;
    color: rgba(255,255,255,0.8);
    opacity: 0;
    transition: opacity 3s;
    pointer-events: none;
    z-index: 1;
  }

  .farewell-text.visible {
    opacity: 1;
  }

</style>
</head>
<body>

  <canvas id="clouds"></canvas>

  <button class="audio-toggle" onclick="toggleMute()" id="mute-btn">🕊️</button>

  <div class="container" id="main-container">
    <div class="envelope-bg"></div>
    <div class="letter-paper">
      <div class="letter-header">To the one who will never read this,</div>
      <textarea id="letter-input" placeholder="Type what you need to say..."></textarea>
      <div style="text-align: center;">
        <button class="btn-release" onclick="releaseLetter()">Release</button>
      </div>
    </div>
  </div>

  <div class="farewell-text" id="farewell">It is gone. You are free.</div>

<script>
  // Cloud Canvas Animation
  const canvas = document.getElementById('clouds');
  const ctx = canvas.getContext('2d');
  let clouds = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Cloud {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height * 0.8;
      this.r = Math.random() * 100 + 50;
      this.vx = Math.random() * 0.2 + 0.1;
      this.alpha = Math.random() * 0.2 + 0.1;
    }
    update() {
      this.x += this.vx;
      if (this.x - this.r > canvas.width) {
        this.x = -this.r;
        this.y = Math.random() * canvas.height * 0.8;
      }
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
      ctx.fill();
    }
  }

  for(let i=0; i<20; i++) clouds.push(new Cloud());

  function animateClouds() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    clouds.forEach(c => { c.update(); c.draw(); });
    requestAnimationFrame(animateClouds);
  }
  animateClouds();

  // Audio System
  let audioCtx;
  let isMuted = false;
  let audioInit = false;
  let masterGain;

  async function initAudio() {
    if (audioInit) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
    audioInit = true;
  }

  function toggleMute() {
    if (!audioInit) initAudio();
    isMuted = !isMuted;
    if (masterGain) masterGain.gain.value = isMuted ? 0 : 0.5;
    document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🕊️';
  }

  // Pen Scratch
  const textArea = document.getElementById('letter-input');
  let scratchTimeout;
  textArea.addEventListener('input', () => {
    if (!audioInit) initAudio();
    if (isMuted) return;

    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.1;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 4000;
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.01, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start(t);
  });

  document.body.addEventListener('click', () => {
    if(!audioInit && !isMuted) initAudio();
  }, {once:true});

  function playReleaseAudio() {
    if (!audioInit || isMuted) return;
    const t = audioCtx.currentTime;
    
    // Wind Sound
    const bufferSize = audioCtx.sampleRate * 5;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(200, t);
    filter.frequency.linearRampToValueAtTime(1000, t + 2);
    filter.frequency.linearRampToValueAtTime(200, t + 5);
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + 2);
    gain.gain.linearRampToValueAtTime(0, t + 5);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start(t);

    // Orchestral Swell (Warm Chords)
    [261.63, 329.63, 392.00, 523.25].forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      
      oscGain.gain.setValueAtTime(0, t);
      oscGain.gain.linearRampToValueAtTime(0.05, t + 2 + i*0.2);
      oscGain.gain.linearRampToValueAtTime(0, t + 6);
      
      osc.connect(oscGain);
      oscGain.connect(masterGain);
      osc.start(t);
      osc.stop(t + 6);
    });
  }

  function releaseLetter() {
    const text = textArea.value.trim();
    if (text === '') return;

    if(!audioInit) initAudio();
    playReleaseAudio();

    const container = document.getElementById('main-container');
    const rect = textArea.getBoundingClientRect();
    
    // Hide container
    container.classList.add('released');

    // Create bird particles
    const chars = text.split('');
    let validChars = chars.filter(c => c.trim() !== '');
    
    // Limit to 200 birds for performance
    if(validChars.length > 200) validChars = validChars.slice(0, 200);

    validChars.forEach((char, i) => {
      const el = document.createElement('div');
      el.className = 'bird-char';
      // Replace character visually with a 'v' to look like a distant bird, 
      // but keeping it subtle. Actually, the prompt says "characters reform into bird-like V-shapes".
      // We will rotate and scale the actual character.
      el.innerText = 'v'; // simplified shape
      
      // Initial position roughly over textarea
      const startX = rect.left + Math.random() * rect.width;
      const startY = rect.top + Math.random() * rect.height;
      
      el.style.left = `${startX}px`;
      el.style.top = `${startY}px`;
      
      document.body.appendChild(el);

      // Phase 1: Burst outwards
      setTimeout(() => {
        const burstX = startX + (Math.random() - 0.5) * 200;
        const burstY = startY - 100 - Math.random() * 100;
        el.style.transform = `translate(${burstX - startX}px, ${burstY - startY}px) scale(1.5)`;
      }, 50);

      // Phase 2: Form flock and fly away
      setTimeout(() => {
        el.classList.add('flying');
        
        // Target far top right
        const tx = window.innerWidth * 1.5 - burstX + (Math.random() - 0.5) * 500;
        const ty = -window.innerHeight - burstY + (Math.random() - 0.5) * 500;
        
        el.style.setProperty('--tx', `${tx}px`);
        el.style.setProperty('--ty', `${ty}px`);
        
        // Add random delays to flap
        el.style.animationDelay = `-${Math.random()}s, 0s`;
        
      }, 1000 + Math.random() * 1000);
      
      // Cleanup
      setTimeout(() => el.remove(), 10000);
    });

    // Show farewell
    setTimeout(() => {
      document.getElementById('farewell').classList.add('visible');
    }, 4000);
  }

</script>
</body>
</html>
